name: Deploy to Dev

on:
  push:
    branches: [dev]
    paths:
      - "api/**"
      - ".github/workflows/deploy-dev.yml"

  # Allow manual deploys from GitHub UI
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (defaults to commit SHA)"
        required: false

concurrency:
  group: deploy-dev
  cancel-in-progress: true   # Cancel previous dev deploys — latest wins

jobs:
  build-and-push:
    name: Build & Push Docker Image (dev)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/api
          tags: |
            type=sha,prefix=dev-,format=short
            type=raw,value=dev-latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Dev Server
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.image_tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ needs.build-and-push.outputs.image_tag }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Deploying image tag: $TAG"

      - name: Copy compose config to dev server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEV_SSH_HOST }}
          username: ${{ secrets.DEV_SSH_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          source: "api/docker-compose.dev-server.yml"
          target: "/opt/zippgo/api/"
          strip_components: 1

      - name: Deploy on dev server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_SSH_HOST }}
          username: ${{ secrets.DEV_SSH_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          script: |
            set -e
            cd /opt/zippgo/api

            # Log in to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # Pull new image
            IMAGE_TAG=${{ steps.tag.outputs.tag }}
            export IMAGE_TAG

            docker compose -f docker-compose.dev-server.yml pull api

            # Start db and redis first (no-op if already running)
            docker compose -f docker-compose.dev-server.yml up -d --wait db redis

            # Run DB migrations
            docker compose -f docker-compose.dev-server.yml run --rm api node dist/migrate.js

            # Restart only the API container
            docker compose -f docker-compose.dev-server.yml up -d --no-deps api
