name: Deploy to Production

on:
  push:
    branches: [main]

  # Allow manual deploys from GitHub UI
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (defaults to commit SHA)"
        required: false

concurrency:
  group: deploy-production
  cancel-in-progress: false   # Never cancel an in-flight deploy

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/api
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.image_tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ needs.build-and-push.outputs.image_tag }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Deploying image tag: $TAG"

      - name: Decode SSH key
        run: |
          echo "${{ secrets.PROD_SSH_KEY }}" | base64 -d > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

      - name: Copy compose & Caddy config to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key_path: /tmp/deploy_key
          source: "api/docker-compose.prod.yml,api/Caddyfile"
          target: "/opt/zippgo/api/"
          strip_components: 1

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key_path: /tmp/deploy_key
          script: |
            set -e
            cd /opt/zippgo/api

            # Log in to GHCR
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

            # Pull new image
            IMAGE_TAG=${{ steps.tag.outputs.tag }}
            export IMAGE_TAG
            docker compose -f docker-compose.prod.yml pull api

            # Rolling restart: bring up new api container, leave db/redis/caddy running
            docker compose -f docker-compose.prod.yml up -d --no-deps api

            # Health check — wait up to 60s for /ready to respond
            echo "Waiting for /ready..."
            for i in $(seq 1 12); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:4000/ready || true)
              if [ "$STATUS" = "200" ]; then
                echo "Health check passed (attempt $i)"
                break
              fi
              echo "  Attempt $i — status $STATUS, retrying in 5s..."
              sleep 5
              if [ "$i" = "12" ]; then
                echo "Health check failed after 60s — rolling back"
                docker compose -f docker-compose.prod.yml up -d --no-deps --rollback api || true
                exit 1
              fi
            done

            # Clean up dangling images
            docker image prune -f

      - name: Notify success
        if: success()
        run: echo "Deployed ${{ steps.tag.outputs.tag }} to production successfully."
