name: ios-testflight

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ios-testflight-${{ github.ref }}
  cancel-in-progress: false

env:
  APP_DIR: mobile-customer
  NODE_VERSION: "20"

jobs:
  build-and-upload:
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.4"

      - name: Print Xcode version
        run: xcodebuild -version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Generate native iOS project for Expo managed app
        working-directory: ${{ env.APP_DIR }}
        run: |
          rm -rf ios
          npx expo prebuild --platform ios --non-interactive

      - name: Restore Fastlane files into generated ios folder
        run: |
          mkdir -p "${{ env.APP_DIR }}/ios/fastlane"
          cp "${{ env.APP_DIR }}/ci/ios-fastlane/Gemfile" "${{ env.APP_DIR }}/ios/Gemfile"
          cp "${{ env.APP_DIR }}/ci/ios-fastlane/fastlane/Fastfile" "${{ env.APP_DIR }}/ios/fastlane/Fastfile"
          cp "${{ env.APP_DIR }}/ci/ios-fastlane/fastlane/Appfile" "${{ env.APP_DIR }}/ios/fastlane/Appfile"

      - name: Verify iOS native project exists
        working-directory: ${{ env.APP_DIR }}
        run: |
          echo "Checking generated iOS project files"
          ls -la ios
          find ios -maxdepth 3 -type d \( -name "*.xcodeproj" -o -name "*.xcworkspace" \) || true
          PROJECT_PATH=$(find ios -maxdepth 3 -type d -name "*.xcodeproj" -print -quit)
          WORKSPACE_PATH=$(find ios -maxdepth 3 -type d -name "*.xcworkspace" -print -quit)
          if [ -z "$PROJECT_PATH" ] && [ -z "$WORKSPACE_PATH" ]; then
            echo "No .xcodeproj or .xcworkspace generated by expo prebuild"
            exit 1
          fi
          if [ -n "$WORKSPACE_PATH" ]; then
            WORKSPACE_REL=${WORKSPACE_PATH#ios/}
            echo "IOS_WORKSPACE_PATH=$WORKSPACE_REL" >> "$GITHUB_ENV"
            echo "IOS_SCHEME=$(basename "$WORKSPACE_REL" .xcworkspace)" >> "$GITHUB_ENV"
          fi
          if [ -n "$PROJECT_PATH" ]; then
            PROJECT_REL=${PROJECT_PATH#ios/}
            echo "IOS_PROJECT_PATH=$PROJECT_REL" >> "$GITHUB_ENV"
            if [ -z "$WORKSPACE_PATH" ]; then
              echo "IOS_SCHEME=$(basename "$PROJECT_REL" .xcodeproj)" >> "$GITHUB_ENV"
            fi
          fi

      - name: Setup Ruby with bundler cache
        uses: ruby/setup-ruby@v1
        env:
          BUNDLE_GEMFILE: ${{ github.workspace }}/${{ env.APP_DIR }}/ios/Gemfile
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Install gems
        working-directory: ${{ env.APP_DIR }}/ios
        run: bundle install --jobs 4 --retry 3

      - name: Print available code signing identities
        run: security find-identity -v -p codesigning || true

      - name: Build and upload to TestFlight
        working-directory: ${{ env.APP_DIR }}/ios
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: bundle exec fastlane beta

      - name: Show gym log on failure
        if: failure()
        run: |
          LOG_FILE=$(ls -t /Users/runner/Library/Logs/gym/*.log 2>/dev/null | head -n1 || true)
          if [ -n "$LOG_FILE" ]; then
            echo "Showing log: $LOG_FILE"
            tail -n 300 "$LOG_FILE"
          else
            echo "No gym log file found"
          fi

      - name: Upload gym logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-gym-logs
          path: /Users/runner/Library/Logs/gym/*.log
          if-no-files-found: ignore
