name: ios-testflight

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ios-testflight-${{ github.ref }}
  cancel-in-progress: false

env:
  APP_DIR: mobile-customer
  NODE_VERSION: "20"
  IOS_TEAM_ID: "87K8YXG5V8"
  IOS_APP_BUNDLE_ID: "com.anonymous.mobilecustomer"
  IOS_EXTENSION_BUNDLE_ID: "com.anonymous.mobilecustomer.DeliveryLiveActivityExtension"

jobs:
  build-and-upload:
    runs-on: macos-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.4"

      - name: Print Xcode version
        run: xcodebuild -version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Generate native iOS project for Expo managed app
        working-directory: ${{ env.APP_DIR }}
        run: |
          rm -rf ios
          npx expo prebuild --platform ios --non-interactive

      - name: Restore Fastlane files into generated ios folder
        run: |
          mkdir -p "${{ env.APP_DIR }}/ios/fastlane"
          cp "${{ env.APP_DIR }}/ci/ios-fastlane/Gemfile" "${{ env.APP_DIR }}/ios/Gemfile"
          cp "${{ env.APP_DIR }}/ci/ios-fastlane/fastlane/Fastfile" "${{ env.APP_DIR }}/ios/fastlane/Fastfile"
          cp "${{ env.APP_DIR }}/ci/ios-fastlane/fastlane/Appfile" "${{ env.APP_DIR }}/ios/fastlane/Appfile"

      - name: Verify iOS native project exists
        working-directory: ${{ env.APP_DIR }}
        run: |
          echo "Checking generated iOS project files"
          ls -la ios
          find ios -maxdepth 3 -type d \( -name "*.xcodeproj" -o -name "*.xcworkspace" \) || true
          PROJECT_PATH=$(find ios -maxdepth 3 -type d -name "*.xcodeproj" ! -name "Pods.xcodeproj" -print -quit)
          WORKSPACE_PATH=$(find ios -maxdepth 3 -type d -name "*.xcworkspace" ! -path "*.xcodeproj/*" -print -quit)
          if [ -z "$PROJECT_PATH" ] && [ -z "$WORKSPACE_PATH" ]; then
            echo "No .xcodeproj or .xcworkspace generated by expo prebuild"
            exit 1
          fi
          if [ -n "$WORKSPACE_PATH" ]; then
            WORKSPACE_REL=${WORKSPACE_PATH#ios/}
            echo "IOS_WORKSPACE_PATH=$WORKSPACE_REL" >> "$GITHUB_ENV"
            echo "IOS_SCHEME=$(basename "$WORKSPACE_REL" .xcworkspace)" >> "$GITHUB_ENV"
          fi
          if [ -n "$PROJECT_PATH" ]; then
            PROJECT_REL=${PROJECT_PATH#ios/}
            echo "IOS_PROJECT_PATH=$PROJECT_REL" >> "$GITHUB_ENV"
            if [ -z "$WORKSPACE_PATH" ]; then
              echo "IOS_SCHEME=$(basename "$PROJECT_REL" .xcodeproj)" >> "$GITHUB_ENV"
            fi
          fi

      - name: Setup Ruby with bundler cache
        uses: ruby/setup-ruby@v1
        env:
          BUNDLE_GEMFILE: ${{ github.workspace }}/${{ env.APP_DIR }}/ios/Gemfile
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Install gems
        working-directory: ${{ env.APP_DIR }}/ios
        run: bundle install --jobs 4 --retry 3

      - name: Debug signing input presence (safe)
        env:
          IOS_DIST_CERT_BASE64: ${{ secrets.IOS_DIST_CERT_BASE64 || secrets.APPLE_DIST_CERT_BASE64 || vars.IOS_DIST_CERT_BASE64 || vars.APPLE_DIST_CERT_BASE64 }}
          IOS_DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD || secrets.APPLE_DIST_CERT_PASSWORD || vars.IOS_DIST_CERT_PASSWORD || vars.APPLE_DIST_CERT_PASSWORD }}
          IOS_PROFILE_APP_BASE64: ${{ secrets.IOS_PROFILE_APP_BASE64 || secrets.IOS_MAIN_PROFILE_BASE64 || vars.IOS_PROFILE_APP_BASE64 || vars.IOS_MAIN_PROFILE_BASE64 }}
          IOS_PROFILE_EXTENSION_BASE64: ${{ secrets.IOS_PROFILE_EXTENSION_BASE64 || secrets.IOS_EXT_PROFILE_BASE64 || vars.IOS_PROFILE_EXTENSION_BASE64 || vars.IOS_EXT_PROFILE_BASE64 }}
          IOS_KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD || secrets.BUILD_KEYCHAIN_PASSWORD || vars.IOS_KEYCHAIN_PASSWORD || vars.BUILD_KEYCHAIN_PASSWORD }}
        run: |
          present() {
            if [ -n "$1" ]; then echo "yes"; else echo "no"; fi
          }
          echo "IOS_DIST_CERT_BASE64 present: $(present "$IOS_DIST_CERT_BASE64")"
          echo "IOS_DIST_CERT_PASSWORD present: $(present "$IOS_DIST_CERT_PASSWORD")"
          echo "IOS_PROFILE_APP_BASE64 present: $(present "$IOS_PROFILE_APP_BASE64")"
          echo "IOS_PROFILE_EXTENSION_BASE64 present: $(present "$IOS_PROFILE_EXTENSION_BASE64")"
          echo "IOS_KEYCHAIN_PASSWORD present: $(present "$IOS_KEYCHAIN_PASSWORD")"

      - name: Install signing certificate and provisioning profiles
        env:
          IOS_DIST_CERT_BASE64: ${{ secrets.IOS_DIST_CERT_BASE64 || secrets.APPLE_DIST_CERT_BASE64 || vars.IOS_DIST_CERT_BASE64 || vars.APPLE_DIST_CERT_BASE64 }}
          IOS_DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD || secrets.APPLE_DIST_CERT_PASSWORD || vars.IOS_DIST_CERT_PASSWORD || vars.APPLE_DIST_CERT_PASSWORD }}
          IOS_PROFILE_APP_BASE64: ${{ secrets.IOS_PROFILE_APP_BASE64 || secrets.IOS_MAIN_PROFILE_BASE64 || vars.IOS_PROFILE_APP_BASE64 || vars.IOS_MAIN_PROFILE_BASE64 }}
          IOS_PROFILE_EXTENSION_BASE64: ${{ secrets.IOS_PROFILE_EXTENSION_BASE64 || secrets.IOS_EXT_PROFILE_BASE64 || vars.IOS_PROFILE_EXTENSION_BASE64 || vars.IOS_EXT_PROFILE_BASE64 }}
          IOS_KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD || secrets.BUILD_KEYCHAIN_PASSWORD || vars.IOS_KEYCHAIN_PASSWORD || vars.BUILD_KEYCHAIN_PASSWORD }}
        run: |
          # Fallback: if extension profile is omitted, reuse the app profile.
          # This works when a single profile covers both bundle identifiers.
          if [ -z "$IOS_PROFILE_EXTENSION_BASE64" ] && [ -n "$IOS_PROFILE_APP_BASE64" ]; then
            IOS_PROFILE_EXTENSION_BASE64="$IOS_PROFILE_APP_BASE64"
            echo "IOS_PROFILE_EXTENSION_BASE64 not provided; reusing IOS_PROFILE_APP_BASE64"
          fi

          # Fallback: auto-generate temporary keychain password when not provided.
          if [ -z "$IOS_KEYCHAIN_PASSWORD" ]; then
            IOS_KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"
            echo "IOS_KEYCHAIN_PASSWORD not provided; generated ephemeral keychain password"
          fi

          MISSING=()
          [ -z "$IOS_DIST_CERT_BASE64" ] && MISSING+=("IOS_DIST_CERT_BASE64")
          [ -z "$IOS_DIST_CERT_PASSWORD" ] && MISSING+=("IOS_DIST_CERT_PASSWORD")
          [ -z "$IOS_PROFILE_APP_BASE64" ] && MISSING+=("IOS_PROFILE_APP_BASE64")
          [ -z "$IOS_PROFILE_EXTENSION_BASE64" ] && MISSING+=("IOS_PROFILE_EXTENSION_BASE64")

          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "Missing signing secrets: ${MISSING[*]}"
            echo "Required base names: IOS_DIST_CERT_BASE64, IOS_DIST_CERT_PASSWORD, IOS_PROFILE_APP_BASE64"
            echo "Optional with fallback: IOS_PROFILE_EXTENSION_BASE64, IOS_KEYCHAIN_PASSWORD"
            exit 1
          fi

          CERT_PATH="$RUNNER_TEMP/dist_cert.p12"
          APP_PROFILE_PATH="$RUNNER_TEMP/app.mobileprovision"
          EXT_PROFILE_PATH="$RUNNER_TEMP/ext.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/ios-build.keychain-db"

          decode_base64_to_file() {
            local input="$1"
            local out_file="$2"
            if ! printf "%s" "$input" | base64 --decode > "$out_file" 2>/dev/null; then
              printf "%s" "$input" | base64 -D > "$out_file"
            fi
          }

          decode_base64_to_file "$IOS_DIST_CERT_BASE64" "$CERT_PATH"
          decode_base64_to_file "$IOS_PROFILE_APP_BASE64" "$APP_PROFILE_PATH"
          decode_base64_to_file "$IOS_PROFILE_EXTENSION_BASE64" "$EXT_PROFILE_PATH"

          security create-keychain -p "$IOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$IOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$IOS_DIST_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$IOS_KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"

          security cms -D -i "$APP_PROFILE_PATH" > "$RUNNER_TEMP/app_profile.plist"
          APP_PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$RUNNER_TEMP/app_profile.plist")
          APP_PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" "$RUNNER_TEMP/app_profile.plist")
          APP_PROFILE_APP_ID=$(/usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" "$RUNNER_TEMP/app_profile.plist")
          APP_PROFILE_EXPIRATION=$(/usr/libexec/PlistBuddy -c "Print :ExpirationDate" "$RUNNER_TEMP/app_profile.plist")
          cp "$APP_PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$APP_PROFILE_UUID.mobileprovision"

          security cms -D -i "$EXT_PROFILE_PATH" > "$RUNNER_TEMP/ext_profile.plist"
          EXT_PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" "$RUNNER_TEMP/ext_profile.plist")
          EXT_PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" "$RUNNER_TEMP/ext_profile.plist")
          EXT_PROFILE_APP_ID=$(/usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" "$RUNNER_TEMP/ext_profile.plist")
          EXT_PROFILE_EXPIRATION=$(/usr/libexec/PlistBuddy -c "Print :ExpirationDate" "$RUNNER_TEMP/ext_profile.plist")
          cp "$EXT_PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$EXT_PROFILE_UUID.mobileprovision"

          EXPECTED_APP_APP_ID="${{ env.IOS_TEAM_ID }}.${{ env.IOS_APP_BUNDLE_ID }}"
          EXPECTED_EXT_APP_ID="${{ env.IOS_TEAM_ID }}.${{ env.IOS_EXTENSION_BUNDLE_ID }}"

          echo "Main profile: $APP_PROFILE_NAME"
          echo "  - UUID: $APP_PROFILE_UUID"
          echo "  - App ID: $APP_PROFILE_APP_ID"
          echo "  - Expires: $APP_PROFILE_EXPIRATION"
          echo "Extension profile: $EXT_PROFILE_NAME"
          echo "  - UUID: $EXT_PROFILE_UUID"
          echo "  - App ID: $EXT_PROFILE_APP_ID"
          echo "  - Expires: $EXT_PROFILE_EXPIRATION"

          if [ "$APP_PROFILE_APP_ID" != "$EXPECTED_APP_APP_ID" ]; then
            echo "Main profile App ID mismatch. Expected: $EXPECTED_APP_APP_ID, got: $APP_PROFILE_APP_ID"
            exit 1
          fi

          if [ "$EXT_PROFILE_APP_ID" != "$EXPECTED_EXT_APP_ID" ]; then
            echo "Extension profile App ID mismatch. Expected: $EXPECTED_EXT_APP_ID, got: $EXT_PROFILE_APP_ID"
            echo "Upload a provisioning profile created for the extension App ID: ${{ env.IOS_EXTENSION_BUNDLE_ID }}"
            exit 1
          fi

          echo "IOS_MAIN_PROFILE_NAME=$APP_PROFILE_NAME" >> "$GITHUB_ENV"
          echo "IOS_EXTENSION_PROFILE_NAME=$EXT_PROFILE_NAME" >> "$GITHUB_ENV"

      - name: Print available code signing identities
        run: security find-identity -v -p codesigning || true

      - name: Build and upload to TestFlight
        working-directory: ${{ env.APP_DIR }}/ios
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          IOS_TEAM_ID: ${{ env.IOS_TEAM_ID }}
          IOS_APP_BUNDLE_ID: ${{ env.IOS_APP_BUNDLE_ID }}
          IOS_EXTENSION_BUNDLE_ID: ${{ env.IOS_EXTENSION_BUNDLE_ID }}
        run: bundle exec fastlane beta

      - name: Show gym log on failure
        if: failure()
        working-directory: ${{ env.APP_DIR }}/ios
        run: |
          LOG_FILE=$(ls -t buildlogs/*.log 2>/dev/null | head -n1 || true)
          if [ -z "$LOG_FILE" ]; then
            LOG_FILE=$(ls -t /Users/runner/Library/Logs/gym/*.log 2>/dev/null | head -n1 || true)
          fi
          if [ -n "$LOG_FILE" ]; then
            echo "Showing log: $LOG_FILE"
            tail -n 1200 "$LOG_FILE"
            echo "\nTop xcode errors (first 40):"
            grep -nE "error:|\*\* ARCHIVE FAILED \*\*|no such module|module map file .* not found|Command SwiftCompile failed|SwiftCompile normal" "$LOG_FILE" | head -n 80 || true
          else
            echo "No gym log file found"
          fi

      - name: Upload gym logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-gym-logs
          path: |
            mobile-customer/ios/buildlogs/*.log
            /Users/runner/Library/Logs/gym/*.log
          if-no-files-found: ignore
