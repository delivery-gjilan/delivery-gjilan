services:
    db:
        image: postgis/postgis:16-3.4
        restart: always
        container_name: delivery-gjilan-db-local
        environment:
            POSTGRES_USER: postgres
            PGUSER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: delivery-gjilan-db-local
        volumes:
            - dbdata:/var/lib/postgresql/data
        ports:
            - 8090:5432

    redis:
        image: redis:7-alpine
        restart: always
        container_name: delivery-gjilan-redis
        ports:
            - 6379:6379
        volumes:
            - redisdata:/data

volumes:
    dbdata:
        driver: local
    redisdata:
        driver: local
