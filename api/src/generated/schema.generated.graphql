type Mutation {
  addUserAddress(input: AddUserAddressInput!): UserAddress!
  adminCancelOrder(id: ID!, reason: String!, settleBusiness: Boolean, settleDriver: Boolean): Order!

  """Admin sends push-to-talk signaling state to one or multiple drivers"""
  adminSendPttSignal(action: DriverPttSignalAction!, channelName: String!, driverIds: [ID!]!, muted: Boolean): Boolean!

  """
  Admin mutation to manually set connection status (for testing/recovery)
  """
  adminSetDriverConnectionStatus(driverId: ID!, status: DriverConnectionStatus!): User!

  """
  Admin mutation to set which drivers are on the current shift.
  Only on-shift drivers will receive new-order dispatch notifications.
  Pass an empty list to clear the shift restriction (all eligible drivers receive notifications).
  """
  adminSetShiftDrivers(driverIds: [ID!]!): Boolean!

  """
  Admin simulation heartbeat — wraps processHeartbeat for SUPER_ADMIN.
  Triggers the full heartbeat pipeline (ETA cache, Live Activity, subscriptions).
  Non-production only.
  """
  adminSimulateDriverHeartbeat(
    activeOrderId: ID
    driverId: ID!
    latitude: Float!
    longitude: Float!
    navigationPhase: String
    remainingEtaSeconds: Int

    """When true, also sets the driver's onlinePreference to true"""
    setOnline: Boolean
  ): DriverHeartbeatResult!
  adminUpdateDriverLocation(driverId: ID!, latitude: Float!, longitude: Float!): User!

  """
  Admin mutation to update per-driver settings (commission %, max active orders, vehicle ownership)
  """
  adminUpdateDriverSettings(commissionPercentage: Float, driverId: ID!, hasOwnVehicle: Boolean, maxActiveOrders: Int, ownVehicleBonusAmount: Float, vehicleType: DriverVehicleType): User!
  adoptCatalogProduct(input: AdoptCatalogProductInput!): Product!
  approveOrder(id: ID!): Order!
  assignDriverToOrder(driverId: ID, id: ID!): Order!
