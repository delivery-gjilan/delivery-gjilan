type Mutation {
  addUserAddress(input: AddUserAddressInput!): UserAddress!

  """Admin sends push-to-talk signaling state to one or multiple drivers"""
  adminSendPttSignal(action: DriverPttSignalAction!, channelName: String!, driverIds: [ID!]!, muted: Boolean): Boolean!

  """
  Admin mutation to manually set connection status (for testing/recovery)
