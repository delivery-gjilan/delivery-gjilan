type DriverConnection {
  """System-calculated: current connection state"""
  connectionStatus: DriverConnectionStatus!

  """Timestamp when driver was marked as DISCONNECTED"""
  disconnectedAt: Date

  """Last timestamp when driver sent a heartbeat (every 5s)"""
  lastHeartbeatAt: Date

  """
  Last timestamp when location was written to DB (throttled to every 10s)
  """
  lastLocationUpdate: Date

  """User's preference: "I want to work" toggle"""
  onlinePreference: Boolean!
}

"""
Connection status for drivers:
- CONNECTED: Actively sending heartbeats
- STALE: No heartbeat for 15 seconds (warning state)
- LOST: No heartbeat for 30 seconds (offline state)
- DISCONNECTED: Subscription closed or never connected
"""
enum DriverConnectionStatus {
  CONNECTED
  DISCONNECTED
  LOST
  STALE
}

"""Result of driver heartbeat mutation"""
type DriverHeartbeatResult {
  """Current connection status after processing"""
  connectionStatus: DriverConnectionStatus!

  """Server timestamp when heartbeat was processed"""
  lastHeartbeatAt: Date!

  """Whether location was actually written to DB (throttled)"""
  locationUpdated: Boolean!

  """Whether heartbeat was processed successfully"""
  success: Boolean!
}

input InitiateSignupInput {
  email: String!
  firstName: String!
  lastName: String!
  password: String!
}

type Location {
  address: String!
  latitude: Float!
  longitude: Float!
}

input LocationInput {
  address: String!
  latitude: Float!
  longitude: Float!
}

input LoginInput {
  email: String!
  password: String!
}

type Mutation {
  """
  Admin mutation to manually set connection status (for testing/recovery)
  """
  adminSetDriverConnectionStatus(driverId: ID!, status: DriverConnectionStatus!): User!
  adminUpdateDriverLocation(driverId: ID!, latitude: Float!, longitude: Float!): User!
  assignDriverToOrder(driverId: ID, id: ID!): Order!
  cancelOrder(id: ID!): Order!
  createBusiness(input: CreateBusinessInput!): Business!
  createDeliveryZone(input: CreateDeliveryZoneInput!): DeliveryZone!
  createOrder(input: CreateOrderInput!): Order!
  createProduct(input: CreateProductInput!): Product!
  createProductCategory(input: CreateProductCategoryInput!): ProductCategory!
  createUser(input: CreateUserInput!): AuthResponse!
  deleteBusiness(id: ID!): Boolean!
  deleteDeliveryZone(id: ID!): Boolean!
  deleteProduct(id: ID!): Boolean!
  deleteProductCategory(id: ID!): Boolean!
  deleteUser(id: ID!): Boolean!

  """
  Driver heartbeat - call every 5 seconds while online.
  Updates lastHeartbeatAt and connectionStatus to CONNECTED.
  Location is throttled: only written if >10s since last write OR moved >5m.
  """
  driverHeartbeat(latitude: Float!, longitude: Float!): DriverHeartbeatResult!
  initiateSignup(input: InitiateSignupInput!): AuthResponse!
  login(input: LoginInput!): AuthResponse!
  resendEmailVerification: SignupStepResponse!
  submitPhoneNumber(input: SubmitPhoneNumberInput!): SignupStepResponse!
  updateBusiness(id: ID!, input: UpdateBusinessInput!): Business!
  updateDeliveryZone(id: ID!, input: UpdateDeliveryZoneInput!): DeliveryZone!
  updateDriverLocation(latitude: Float!, longitude: Float!): User!
  updateDriverOnlineStatus(isOnline: Boolean!): User!
  updateOrderStatus(id: ID!, status: OrderStatus!): Order!
  updateProduct(id: ID!, input: UpdateProductInput!): Product!
  updateProductCategory(id: ID!, input: UpdateProductCategoryInput!): ProductCategory!
  updateUser(input: UpdateUserInput!): User!
  updateUserNote(flagColor: String, note: String, userId: ID!): User!
  verifyEmail(input: VerifyEmailInput!): SignupStepResponse!
  verifyPhone(input: VerifyPhoneInput!): SignupStepResponse!
}

