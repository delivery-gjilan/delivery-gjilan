type Product {
    id: ID!
    businessId: ID!
    categoryId: ID!
    name: String!
    description: String
    imageUrl: String
    price: Float!
    isOnSale: Boolean!
    salePrice: Float
    isAvailable: Boolean!
    createdAt: String!
    updatedAt: String!
}
type Query {
    products(businessId: ID!): [Product!]! @skipAuth
    product(id: ID!): Product @skipAuth
}

input CreateProductInput {
    businessId: ID!
    categoryId: ID!
    subcategoryId: ID
    name: String!
    description: String
    imageUrl: String
    price: Float!
    isOnSale: Boolean
    salePrice: Float
    isAvailable: Boolean
}

input UpdateProductInput {
    categoryId: ID
    subcategoryId: ID
    name: String
    description: String
    imageUrl: String
    price: Float
    isOnSale: Boolean
    salePrice: Float
    isAvailable: Boolean
}

type Mutation {
    createProduct(input: CreateProductInput!): Product!
    updateProduct(id: ID!, input: UpdateProductInput!): Product!
    deleteProduct(id: ID!): Boolean!
}
