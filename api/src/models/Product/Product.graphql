type Product {
    id: ID!
    businessId: ID!
    categoryId: ID!
    subcategoryId: ID
    name: String!
    description: String
    imageUrl: String
    price: Float!
    isOnSale: Boolean!
    salePrice: Float
    isAvailable: Boolean!
    sortOrder: Int!
    stock: Int!
    createdAt: String!
    updatedAt: String!
}
type Query {
    products(businessId: ID!): [Product!]! @skipAuth
    product(id: ID!): Product @skipAuth
}

input CreateProductInput {
    businessId: ID!
    categoryId: ID!
    subcategoryId: ID
    name: String!
    description: String
    imageUrl: String
    price: Float!
    isOnSale: Boolean
    salePrice: Float
    isAvailable: Boolean
    stock: Int
}

input UpdateProductInput {
    categoryId: ID
    subcategoryId: ID
    name: String
    description: String
    imageUrl: String
    price: Float
    isOnSale: Boolean
    salePrice: Float
    isAvailable: Boolean
    sortOrder: Int
    stock: Int
}

input ProductOrderInput {
    id: ID!
    sortOrder: Int!
}

type Mutation {
    createProduct(input: CreateProductInput!): Product!
    updateProduct(id: ID!, input: UpdateProductInput!): Product!
    updateProductsOrder(businessId: ID!, products: [ProductOrderInput!]!): Boolean!
    deleteProduct(id: ID!): Boolean!
}
