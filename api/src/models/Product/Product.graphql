type Product {
    id: ID!
    businessId: ID!
    categoryId: ID!
    name: String!
    description: String
    imageUrl: String
    price: Float!
    isOnSale: Boolean!
    salePrice: Float
    isAvailable: Boolean!
    createdAt: String!
    updatedAt: String!
}

extend type Query {
    products(businessId: ID, categoryId: ID): [Product!]!
    product(id: ID!): Product
}

input CreateProductInput {
    businessId: ID!
    categoryId: ID!
    name: String!
    description: String
    imageUrl: String
    price: Float!
    isOnSale: Boolean
    salePrice: Float
}

input UpdateProductInput {
    categoryId: ID
    name: String
    description: String
    imageUrl: String
    price: Float
    isOnSale: Boolean
    salePrice: Float
    isAvailable: Boolean
}

extend type Mutation {
    createProduct(input: CreateProductInput!): Product!
    updateProduct(id: ID!, input: UpdateProductInput!): Product!
    deleteProduct(id: ID!): Boolean!
}
