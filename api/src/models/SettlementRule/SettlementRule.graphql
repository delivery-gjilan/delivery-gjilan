enum SettlementRuleType {
  PERCENTAGE
  FIXED_PER_ORDER
  PRODUCT_MARKUP
  DRIVER_VEHICLE_BONUS
  CUSTOM
}

enum SettlementEntityType {
  DRIVER
  BUSINESS
}

type SettlementRule {
  id: ID!
  entityType: SettlementEntityType!
  entityId: String!
  ruleType: SettlementRuleType!
  config: JSON!
  canStackWith: [String!]!
  priority: Int!
  isActive: Boolean!
  notes: String
  activatedAt: String
  activatedBy: String
  createdAt: String!
  updatedAt: String!
}

type SettlementRuleSummary {
  totalRules: Int!
  activeRules: Int!
  rulesByType: JSON!
}

input CreateSettlementRuleInput {
  entityType: SettlementEntityType!
  entityId: String!
  ruleType: SettlementRuleType!
  config: JSON!
  canStackWith: [String!]
  priority: Int
  notes: String
}

input UpdateSettlementRuleInput {
  config: JSON
  canStackWith: [String!]
  priority: Int
  notes: String
}

input SettlementRuleFilterInput {
  entityType: SettlementEntityType
  entityId: String
  ruleType: SettlementRuleType
  isActive: Boolean
}

extend type Query {
  settlementRule(id: ID!): SettlementRule
  settlementRules(filter: SettlementRuleFilterInput): [SettlementRule!]!
  activeRulesForEntity(entityType: SettlementEntityType!, entityId: String!): [SettlementRule!]!
  settlementRuleSummary(entityType: SettlementEntityType!, entityId: String!): SettlementRuleSummary!
}

extend type Mutation {
  createSettlementRule(input: CreateSettlementRuleInput!): SettlementRule!
  updateSettlementRule(id: ID!, input: UpdateSettlementRuleInput!): SettlementRule!
  activateSettlementRule(id: ID!): SettlementRule!
  deactivateSettlementRule(id: ID!): SettlementRule!
  deleteSettlementRule(id: ID!): Boolean!
}
