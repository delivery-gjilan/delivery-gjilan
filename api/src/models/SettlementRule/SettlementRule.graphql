enum SettlementEntityType {
  DRIVER
  BUSINESS
}

enum SettlementAmountType {
  FIXED
  PERCENT
}

enum SettlementRuleType {
  ORDER_PRICE
  DELIVERY_PRICE
}

type SettlementRule {
  id: ID!
  name: String!
  type: SettlementRuleType!
  entityType: SettlementEntityType!
  direction: SettlementDirection!
  amountType: SettlementAmountType!
  amount: Float!
  # Legacy field kept for backward compatibility - derived from type
  appliesTo: String
  business: Business
  promotion: Promotion
  isActive: Boolean!
  notes: String
  createdAt: String!
  updatedAt: String!
}

input CreateSettlementRuleInput {
  name: String!
  type: SettlementRuleType!
  entityType: SettlementEntityType!
  direction: SettlementDirection!
  amountType: SettlementAmountType!
  amount: Float!
  # Legacy field kept for backward compatibility - ignored, use type instead
  appliesTo: String
  businessId: ID
  promotionId: ID
  notes: String
}

input UpdateSettlementRuleInput {
  name: String
  type: SettlementRuleType
  direction: SettlementDirection
  amountType: SettlementAmountType
  amount: Float
  # Legacy field kept for backward compatibility - ignored, use type instead
  appliesTo: String
  isActive: Boolean
  notes: String
}

enum SettlementRuleScope {
  GLOBAL
  BUSINESS
  PROMOTION
  BUSINESS_PROMOTION
}

input SettlementRuleFilterInput {
  entityTypes: [SettlementEntityType!]
  type: SettlementRuleType
  businessIds: [ID!]
  promotionIds: [ID!]
  scopes: [SettlementRuleScope!]
  isActive: Boolean
}

extend type Query {
  settlementRule(id: ID!): SettlementRule
  settlementRules(filter: SettlementRuleFilterInput): [SettlementRule!]!
}

extend type Mutation {
  createSettlementRule(input: CreateSettlementRuleInput!): SettlementRule!
  updateSettlementRule(id: ID!, input: UpdateSettlementRuleInput!): SettlementRule!
  deleteSettlementRule(id: ID!): Boolean!
}
