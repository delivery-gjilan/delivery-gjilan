type DeliveryZone {
    id: ID!
    name: String!
    description: String
    feeDelta: Float!
    color: String!
    priority: Int!
    isActive: Boolean!
    geometry: String!
    createdAt: DateTime!
    updatedAt: DateTime!
}

input CreateDeliveryZoneInput {
    name: String!
    description: String
    feeDelta: Float!
    color: String
    priority: Int
    isActive: Boolean
    geometry: String!
}

input UpdateDeliveryZoneInput {
    name: String
    description: String
    feeDelta: Float
    color: String
    priority: Int
    isActive: Boolean
    geometry: String
}

type ZoneFeeResult {
    zone: DeliveryZone
    totalFee: Float!
    baseDeliveryFee: Float!
}

extend type Query {
    deliveryZones: [DeliveryZone!]!
    deliveryZone(id: ID!): DeliveryZone
    calculateDeliveryFee(latitude: Float!, longitude: Float!, baseDeliveryFee: Float!): ZoneFeeResult!
}

extend type Mutation {
    createDeliveryZone(input: CreateDeliveryZoneInput!): DeliveryZone!
    updateDeliveryZone(id: ID!, input: UpdateDeliveryZoneInput!): DeliveryZone!
    deleteDeliveryZone(id: ID!): Boolean!
}
