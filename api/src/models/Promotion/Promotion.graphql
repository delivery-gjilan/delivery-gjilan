# Promotion System GraphQL Schema

enum PromotionType {
  FIXED_AMOUNT
  PERCENTAGE
  FREE_DELIVERY
  SPEND_X_GET_FREE
  SPEND_X_PERCENT
  SPEND_X_FIXED
}

enum PromotionTarget {
  ALL_USERS
  SPECIFIC_USERS
  FIRST_ORDER
  NEW_USERS
  CONDITIONAL
}

enum PromotionScheduleType {
  ALWAYS
  DATE_RANGE
  RECURRING
}

enum PromotionCreatorType {
  PLATFORM
  BUSINESS
}

type Promotion {
  id: ID!
  name: String!
  description: String
  code: String
  type: PromotionType!
  target: PromotionTarget!
  discountValue: Float
  maxDiscountCap: Float
  minOrderAmount: Float
  spendThreshold: Float
  thresholdReward: String
  maxGlobalUsage: Int
  currentGlobalUsage: Int!
  maxUsagePerUser: Int
  isStackable: Boolean!
  priority: Int!
  isActive: Boolean!
  startsAt: String
  endsAt: String
  scheduleType: PromotionScheduleType!
  scheduleTimezone: String
  dailyStartTime: String
  dailyEndTime: String
  activeWeekdays: [Int!]
  newUserWindowDays: Int
  createdAt: String!
  
  # Analytics
  totalUsageCount: Int!
  totalRevenue: Float!

  # Flags
  isRecovery: Boolean!

  # For recovery promotions: the order that triggered the compensation
  orderId: ID

  # Creator
  creatorType: PromotionCreatorType!
  creatorId: ID
  
  # Relations
  assignedUsers: [UserPromotion!]
  eligibleBusinesses: [Business!]
}

type UserPromotion {
  id: ID!
  userId: ID!
  promotionId: ID!
  assignedAt: String!
  expiresAt: String
  usageCount: Int!
  
  # Relations
  user: User
  promotion: Promotion
}

type PromotionUsage {
  id: ID!
  promotionId: ID!
  userId: ID!
  orderId: ID!
  orderSubtotal: Float!
  discountAmount: Float!
  freeDeliveryApplied: Boolean!
  businessId: ID
  usedAt: String!
  
  # Relations
  promotion: Promotion
  user: User
  order: Order
}

type ApplicablePromotion {
  id: ID!
  name: String!
  description: String
  code: String
  type: PromotionType!
  target: PromotionTarget!
  appliedAmount: Float!
  freeDelivery: Boolean!
  priority: Int!
}

type PromotionThreshold {
  id: ID!
  name: String!
  code: String
  spendThreshold: Float!
  eligibleBusinessIds: [ID!]
  priority: Int!
  isActive: Boolean!
}

type PromotionResult {
  promotions: [ApplicablePromotion!]!
  totalDiscount: Float!
  freeDeliveryApplied: Boolean!
  finalSubtotal: Float!
  finalDeliveryPrice: Float!
  finalTotal: Float!
}

type UserPromoMetadata {
  userId: ID!
  hasUsedFirstOrderPromo: Boolean!
  totalSavings: Float!
  totalPromosUsed: Int!
  lastPromoUsedAt: String
  
  # Relations
  user: User
}

type PromotionAudienceGroup {
  id: ID!
  name: String!
  description: String
  isActive: Boolean!
  memberCount: Int!
  members: [User!]!
  createdAt: String!
  updatedAt: String!
}

# ============================================
# INPUTS
# ============================================

input CreatePromotionInput {
  name: String!
  description: String
  code: String
  type: PromotionType!
  target: PromotionTarget!
  discountValue: Float
  maxDiscountCap: Float
  minOrderAmount: Float
  spendThreshold: Float
  thresholdReward: String
  maxGlobalUsage: Int
  maxUsagePerUser: Int
  isStackable: Boolean!
  priority: Int!
  isActive: Boolean!
  startsAt: String
  endsAt: String
  scheduleType: PromotionScheduleType
  scheduleTimezone: String
  dailyStartTime: String
  dailyEndTime: String
  activeWeekdays: [Int!]
  newUserWindowDays: Int

  # Creator
  creatorType: PromotionCreatorType!
  creatorId: ID

  # Optional: Assign to specific users
  targetUserIds: [ID!]

  # Optional: Assign to persistent audience groups (users resolved at creation time)
  targetAudienceGroupIds: [ID!]

  # Optional: Restrict to specific businesses
  eligibleBusinessIds: [ID!]

  # Mark as recovery/compensation — hides from main promotions list
  isRecovery: Boolean

  # Required for delivery-fee promotions (FREE_DELIVERY / SPEND_X_GET_FREE)
  # This is always a FIXED euro amount per order.
  driverPayoutAmount: Float
}

input UpdatePromotionInput {
  id: ID!
  name: String
  description: String
  code: String
}

input IssueRecoveryPromotionInput {
  # Discount type and value
  type: PromotionType!
  discountValue: Float

  # User(s) to compensate
  userIds: [ID!]!

  # The order this compensation is for (optional when issuing from notifications page)
  orderId: ID

  # Human-readable reason (used as promotion name/description internally)
  reason: String!

  # ISO datetime string; if omitted defaults to 30 days from now
  expiresAt: String
}

input AssignPromotionToUserInput {
  promotionId: ID!
  userIds: [ID!]!
  audienceGroupIds: [ID!]
  expiresAt: String
}

input CreatePromotionAudienceGroupInput {
  name: String!
  description: String
  userIds: [ID!]!
  isActive: Boolean
}

input UpdatePromotionAudienceGroupInput {
  id: ID!
  name: String
  description: String
  userIds: [ID!]
  isActive: Boolean
}

input CartContextInput {
  items: [CartItemInput!]!
  subtotal: Float!
  deliveryPrice: Float!
  businessIds: [ID!]!
}

input CartItemInput {
  productId: ID!
  businessId: ID!
  quantity: Int!
  price: Float!
}

# ============================================
# QUERIES
# ============================================

type Query {
  # Get all promotions (admin). Recovery promotions are excluded by default.
  getAllPromotions(isActive: Boolean, includeRecovery: Boolean): [Promotion!]!

  # Get all recovery/compensation promotions with their assigned users (admin only)
  getRecoveryPromotions: [Promotion!]!
  
  # Get single promotion
  getPromotion(id: ID!): Promotion
  
  # Get applicable promotions for user's cart
  getApplicablePromotions(cart: CartContextInput!, manualCode: String): [ApplicablePromotion!]!

  # Get active global promotions visible to customers (no cart context needed)
  getActiveGlobalPromotions: [Promotion!]!

  # Get active spend-threshold promotions (for progress bars)
  getPromotionThresholds(cart: CartContextInput!): [PromotionThreshold!]!
  
  # Validate and apply promotions (returns final prices)
  validatePromotions(cart: CartContextInput!, manualCode: String): PromotionResult!
  
  # Get user's assigned promotions
  getUserPromotions(userId: ID!): [UserPromotion!]!
  
  # Get promotion usage history
  getPromotionUsage(promotionId: ID!, limit: Int, offset: Int): [PromotionUsage!]!
  
  # Get user's promo metadata (first order status, savings)
  getUserPromoMetadata(userId: ID!): UserPromoMetadata
  
  # Analytics
  getPromotionAnalytics(promotionId: ID!): PromotionAnalyticsResult!
  getPromotionsAnalytics(from: String, to: String, includeRecovery: Boolean, isActive: Boolean): PromotionsAnalyticsResult!

  # Persistent audience groups for targeted promotions
  getPromotionAudienceGroups(isActive: Boolean, search: String): [PromotionAudienceGroup!]!
}

type PromotionAnalyticsResult {
  promotion: Promotion!
  totalUsageCount: Int!
  totalRevenue: Float!
  totalDiscountGiven: Float!
  uniqueUsers: Int!
  averageOrderValue: Float!
  conversionRate: Float
}

type PromotionsAnalyticsSummary {
  totalUsageCount: Int!
  totalDeducted: Float!
  totalDiscountDeducted: Float!
  totalDeliveryDeducted: Float!
  platformPaid: Float!
  businessPaid: Float!
  uniqueUsers: Int!
  averageOrderValue: Float!
}

type PromotionAnalyticsListItem {
  promotion: Promotion!
  creatorName: String
  totalUsageCount: Int!
  uniqueUsers: Int!
  totalDeducted: Float!
  totalDiscountDeducted: Float!
  totalDeliveryDeducted: Float!
  platformPaid: Float!
  businessPaid: Float!
  freeDeliveryUsageCount: Int!
  averageOrderValue: Float!
}

type PromotionAnalyticsDailyPoint {
  date: String!
  usageCount: Int!
  uniqueUsers: Int!
  totalDeducted: Float!
  totalDiscountDeducted: Float!
  totalDeliveryDeducted: Float!
  platformPaid: Float!
  businessPaid: Float!
}

type PromotionsAnalyticsResult {
  summary: PromotionsAnalyticsSummary!
  items: [PromotionAnalyticsListItem!]!
  dailyPoints: [PromotionAnalyticsDailyPoint!]!
}

# ============================================
# MUTATIONS
# ============================================

type Mutation {
  # Create new promotion
  createPromotion(input: CreatePromotionInput!): Promotion!
  
  # Update promotion
  updatePromotion(input: UpdatePromotionInput!): Promotion!
  
  # Delete (deactivate) promotion
  deletePromotion(id: ID!): Boolean!
  
  # Assign promotion to specific users
  assignPromotionToUsers(input: AssignPromotionToUserInput!): [UserPromotion!]!
  
  # Remove user assignment
  removeUserFromPromotion(promotionId: ID!, userId: ID!): Boolean!

  # Issue a one-time recovery/compensation promotion for specific users in a single step
  issueRecoveryPromotion(input: IssueRecoveryPromotionInput!): [UserPromotion!]!
  
  # Mark first order used (called after order created)
  markFirstOrderUsed(userId: ID!): UserPromoMetadata!

  # Grant the user a free delivery on their next order (one-time courtesy comp)
  grantFreeDelivery(userId: ID!, orderId: ID!): Boolean!

  # Persistent audience groups
  createPromotionAudienceGroup(input: CreatePromotionAudienceGroupInput!): PromotionAudienceGroup!
  updatePromotionAudienceGroup(input: UpdatePromotionAudienceGroupInput!): PromotionAudienceGroup!
  deletePromotionAudienceGroup(id: ID!): Boolean!
}
