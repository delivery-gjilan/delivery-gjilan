scalar Date
scalar DateTime

type Location {
    latitude: Float!
    longitude: Float!
    address: String!
}

input LocationInput {
    latitude: Float!
    longitude: Float!
    address: String!
}

type WorkingHours {
    opensAt: String! # "08:00"
    closesAt: String! # "23:00"
}

input WorkingHoursInput {
    opensAt: String! # "08:00"
    closesAt: String! # "23:00"
}

type BusinessDayHours {
    id: ID!
    dayOfWeek: Int!    # 0=Sun … 6=Sat
    opensAt: String!   # "HH:MM"
    closesAt: String!  # "HH:MM"
}

input BusinessDayHoursInput {
    dayOfWeek: Int!    # 0=Sun … 6=Sat
    opensAt: String!   # "HH:MM"
    closesAt: String!  # "HH:MM"
}

enum BannerType {
    INFO
    WARNING
    SUCCESS
}

type StoreStatus {
    isStoreClosed: Boolean!
    closedMessage: String
    bannerEnabled: Boolean!
    bannerMessage: String
    bannerType: BannerType!
    dispatchModeEnabled: Boolean!
    googleMapsNavEnabled: Boolean!
    inventoryModeEnabled: Boolean!
    earlyDispatchLeadMinutes: Int!
    businessGracePeriodMinutes: Int!
    directDispatchEnabled: Boolean!
    directDispatchDriverReserve: Int!
    """Distance (km) beyond which gas vehicles are dispatched first. 0 = disabled."""
    farOrderThresholdKm: Float!
    """Seconds gas drivers get head-start before electric drivers are notified for far orders."""
    gasPriorityWindowSeconds: Int!
}

input UpdateStoreStatusInput {
    isStoreClosed: Boolean!
    closedMessage: String
    bannerEnabled: Boolean
    bannerMessage: String
    bannerType: BannerType
    dispatchModeEnabled: Boolean
    googleMapsNavEnabled: Boolean
    inventoryModeEnabled: Boolean
    earlyDispatchLeadMinutes: Int
    businessGracePeriodMinutes: Int
    directDispatchEnabled: Boolean
    directDispatchDriverReserve: Int
    farOrderThresholdKm: Float
    gasPriorityWindowSeconds: Int
}

type Query {
    getStoreStatus(url: String): StoreStatus!
}

type Mutation {
    updateStoreStatus(input: UpdateStoreStatusInput!): StoreStatus!
}

extend type Subscription {
    storeStatusUpdated: StoreStatus!
}
