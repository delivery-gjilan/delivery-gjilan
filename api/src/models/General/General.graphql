scalar Date
scalar DateTime

type Location {
    latitude: Float!
    longitude: Float!
    address: String!
}

input LocationInput {
    latitude: Float!
    longitude: Float!
    address: String!
}

type WorkingHours {
    opensAt: String! # "08:00"
    closesAt: String! # "23:00"
}

input WorkingHoursInput {
    opensAt: String! # "08:00"
    closesAt: String! # "23:00"
}

input SubscriptionInput {
    token: String!
}
