enum BannerMediaType {
    IMAGE
    GIF
    VIDEO
}

enum BannerDisplayContext {
    HOME            # Home page carousel
    BUSINESS        # Business detail page
    CATEGORY        # Category page
    PRODUCT         # Product detail page
    CART            # Cart page
    ALL             # All pages
}

type Banner {
    id: ID!
    title: String
    subtitle: String
    imageUrl: String!
    mediaType: BannerMediaType!
    
    # Relationships
    businessId: ID
    business: Business
    productId: ID
    product: Product
    promotionId: ID
    promotion: Promotion
    
    # Legacy link configuration (kept for backward compatibility)
    linkType: String
    linkTarget: String
    
    # Display configuration
    displayContext: BannerDisplayContext!
    
    # Scheduling
    startsAt: DateTime
    endsAt: DateTime
    
    # Ordering and status
    sortOrder: Int!
    isActive: Boolean!
    
    # Metadata
    createdAt: DateTime!
    updatedAt: DateTime!
}

input CreateBannerInput {
    title: String
    subtitle: String
    imageUrl: String!
    mediaType: BannerMediaType
    
    # Relationships
    businessId: ID
    productId: ID
    promotionId: ID
    
    # Legacy link configuration
    linkType: String
    linkTarget: String
    
    # Display configuration
    displayContext: BannerDisplayContext
    
    # Scheduling
    startsAt: DateTime
    endsAt: DateTime
    
    sortOrder: Int
    isActive: Boolean
}

input UpdateBannerInput {
    title: String
    subtitle: String
    imageUrl: String
    mediaType: BannerMediaType
    
    # Relationships
    businessId: ID
    productId: ID
    promotionId: ID
    
    # Legacy link configuration
    linkType: String
    linkTarget: String
    
    # Display configuration
    displayContext: BannerDisplayContext
    
    # Scheduling
    startsAt: DateTime
    endsAt: DateTime
    
    sortOrder: Int
    isActive: Boolean
}

input GetBannersFilter {
    activeOnly: Boolean
    businessId: ID
    productId: ID
    promotionId: ID
    displayContext: BannerDisplayContext
    includeScheduled: Boolean  # If true, only return banners within their scheduled time
}

extend type Query {
    getBanners(filter: GetBannersFilter): [Banner!]!
    getBanner(id: ID!): Banner
    getActiveBanners(displayContext: BannerDisplayContext): [Banner!]!  # Returns only active and scheduled banners
}

extend type Mutation {
    createBanner(input: CreateBannerInput!): Banner!
    updateBanner(id: ID!, input: UpdateBannerInput!): Banner!
    deleteBanner(id: ID!): Boolean!
    updateBannerOrder(bannerId: ID!, newSortOrder: Int!): Banner!
}
