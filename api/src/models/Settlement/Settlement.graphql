enum SettlementType {
    DRIVER
    BUSINESS
}

enum SettlementDirection {
    RECEIVABLE
    PAYABLE
}

enum SettlementAmountType {
    FIXED
    PERCENT
}

# Kept for backward compatibility - no longer backed by DB column
enum SettlementStatus {
    PENDING
    PAID
    OVERDUE
    DISPUTED
    CANCELLED
}

type Settlement {
    id: ID!
    type: SettlementType!
    direction: SettlementDirection!
    driver: User
    business: Business
    order: Order
    ruleId: ID
    rule: SettlementRule
    amount: Float!
    # Legacy fields kept for backward compatibility (derived from isSettled)
    currency: String!
    status: SettlementStatus!
    isSettled: Boolean!
    settlementPayment: SettlementPayment
    sourcePayment: SettlementPayment
    # Legacy fields - return null (no longer stored in DB)
    paidAt: Date
    paymentReference: String
    paymentMethod: String
    createdAt: Date!
    updatedAt: Date!
}

type SettlementSummary {
    totalAmount: Float!
    totalPending: Float!
    totalPaid: Float!
    totalReceivable: Float!
    totalPayable: Float!
    count: Int!
    pendingCount: Int!
}

type SettlementScenarioDefinition {
    id: String!
    name: String!
    description: String!
}

type SettlementScenarioResult {
    scenarioId: String!
    name: String!
    passed: Boolean!
    expectedCount: Int!
    actualCount: Int!
    mismatches: [String!]!
    expectedSettlements: JSON!
    actualSettlements: JSON!
}

type SettlementScenarioHarnessResult {
    passed: Boolean!
    total: Int!
    passedCount: Int!
    failedCount: Int!
    results: [SettlementScenarioResult!]!
}

type Query {
    settlements(
        type: SettlementType
        direction: SettlementDirection
        status: SettlementStatus
        isSettled: Boolean
        driverId: ID
        businessId: ID
        orderId: ID
        promotionId: ID
        startDate: Date
        endDate: Date
        limit: Int
        offset: Int
    ): [Settlement!]!
    
    settlementSummary(
        type: SettlementType
        direction: SettlementDirection
        isSettled: Boolean
        driverId: ID
        businessId: ID
        orderId: ID
        promotionId: ID
        startDate: Date
        endDate: Date
    ): SettlementSummary!

    settlementScenarioDefinitions: [SettlementScenarioDefinition!]!
    
    driverBalance(driverId: ID!): SettlementSummary!
    businessBalance(businessId: ID!): SettlementSummary!
    unsettledBalance(entityType: SettlementType!, entityId: ID!): Float!

    settlementPayments(
        entityType: SettlementType
        driverId: ID
        businessId: ID
        startDate: Date
        endDate: Date
        limit: Int
        offset: Int
    ): [SettlementPayment!]!

    settlementPayment(id: ID!): SettlementPayment
}

"""Summary of a driver's cash position and settlement breakdown."""
type DriverCashSummary {
    """Total cash collected from delivered CASH_TO_DRIVER orders (totalPrice - businessPrice)."""
    cashCollected: Float!
    """Number of delivered orders in the period."""
    totalDeliveries: Int!
    """Sum of unsettled RECEIVABLE settlements (driver owes platform)."""
    youOwePlatform: Float!
    """Sum of unsettled PAYABLE settlements (platform owes driver)."""
    platformOwesYou: Float!
    """Net settlement balance: platformOwesYou - youOwePlatform."""
    netSettlement: Float!
    """Cash driver keeps after all settlements: cashCollected + netSettlement."""
    takeHome: Float!
}

"""Grouped settlement totals by category."""
type SettlementBreakdownItem {
    """Category key (e.g. PLATFORM_COMMISSION, PROMOTION_COST, MARKUP_REMITTANCE, DELIVERY_COMMISSION)."""
    category: String!
    """Human-readable label for the category."""
    label: String!
    """Total amount for this category."""
    totalAmount: Float!
    """Number of settlements in this category."""
    count: Int!
    """Direction of these settlements."""
    direction: SettlementDirection!
}

extend type Query {
    """Driver cash summary with settlement breakdown. Auto-scoped to current driver."""
    driverCashSummary(startDate: Date, endDate: Date): DriverCashSummary!
    """Grouped settlement breakdown by category."""
    settlementBreakdown(
        type: SettlementType
        businessId: ID
        driverId: ID
        isSettled: Boolean
        startDate: Date
        endDate: Date
    ): [SettlementBreakdownItem!]!
}

type Mutation {
    markSettlementAsPaid(settlementId: ID!, paymentReference: String, paymentMethod: String): Settlement!
    markSettlementsAsPaid(ids: [ID!]!, paymentReference: String, paymentMethod: String): [Settlement!]!
    markSettlementAsPartiallyPaid(settlementId: ID!, amount: Float!): Settlement!
    unsettleSettlement(settlementId: ID!): Settlement!
    backfillSettlementsForDeliveredOrders: Int!
    runSettlementScenarioHarness(scenarioIds: [String!]): SettlementScenarioHarnessResult!

    """Admin creates a settlement request, notifying the business or driver via push."""
    createSettlementRequest(
        businessId: ID
        driverId: ID
        amount: Float!
        periodStart: Date!
        periodEnd: Date!
        note: String
    ): SettlementRequest!

    """Business owner accepts or disputes a pending settlement request."""
    respondToSettlementRequest(
        requestId: ID!
        action: SettlementRequestAction!
        disputeReason: String
    ): SettlementRequest!

    """Admin cancels an outstanding settlement request."""
    cancelSettlementRequest(requestId: ID!): SettlementRequest!

    """Settle unsettled settlements for a driver. Supports partial payment."""
    settleWithDriver(
        driverId: ID!
        amount: Float
        paymentMethod: String
        paymentReference: String
        note: String
    ): SettleResult!

    """Settle all unsettled settlements for a business. Supports partial payment."""
    settleWithBusiness(
        businessId: ID!
        amount: Float!
        paymentMethod: String
        paymentReference: String
        note: String
    ): SettleResult!
}

# ─── Settlement Requests ─────────────────────────────────────────────────────

enum SettlementRequestStatus {
    PENDING_APPROVAL
    ACCEPTED
    DISPUTED
    EXPIRED
    CANCELLED
}

enum SettlementRequestAction {
    ACCEPT
    DISPUTE
}

type SettlementRequest {
    id: ID!
    entityType: SettlementType!
    business: Business
    driver: User
    requestedBy: User
    amount: Float!
    currency: String!
    periodStart: Date!
    periodEnd: Date!
    note: String
    status: SettlementRequestStatus!
    respondedAt: Date
    respondedBy: User
    disputeReason: String
    expiresAt: Date!
    createdAt: Date!
    updatedAt: Date!
}

extend type Query {
    settlementRequests(
        businessId: ID
        driverId: ID
        entityType: SettlementType
        status: SettlementRequestStatus
        limit: Int
        offset: Int
    ): [SettlementRequest!]!
}

extend type Subscription {
    settlementCreated(type: SettlementType): Settlement!
    settlementStatusChanged(id: ID!): Settlement!
}

# ─── Settlement Payments ──────────────────────────────────────────────────────

enum SettlementPaymentDirection {
    ENTITY_TO_PLATFORM
    PLATFORM_TO_ENTITY
}

type SettlementPayment {
    id: ID!
    entityType: SettlementType!
    driver: User
    business: Business
    amount: Float!
    # Legacy fields kept for backward compatibility
    direction: SettlementPaymentDirection
    totalBalanceAtTime: Float
    paymentMethod: String
    paymentReference: String
    note: String
    createdBy: User
    createdAt: Date!
}

type SettleResult {
    payment: SettlementPayment!
    settledCount: Int!
    netAmount: Float!
    direction: SettlementPaymentDirection!
    remainderAmount: Float!
    remainderSettlement: Settlement
}
