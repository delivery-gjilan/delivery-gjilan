enum SettlementType {
    DRIVER
    BUSINESS
}

enum SettlementDirection {
    RECEIVABLE
    PAYABLE
}

enum SettlementStatus {
    PENDING
    PAID
    OVERDUE
    DISPUTED
    CANCELLED
}

type RuleSnapshot {
    appliedRules: JSON!
}

type CalculationDetails {
    itemsBreakdown: JSON!
    rulesApplied: JSON!
}

type Settlement {
    id: ID!
    type: SettlementType!
    direction: SettlementDirection!
    driver: User
    business: Business
    order: Order!
    amount: Float!
    currency: String!
    status: SettlementStatus!
    ruleSnapshot: RuleSnapshot
    calculationDetails: CalculationDetails
    metadata: JSON
    paidAt: Date
    paidBy: String
    paymentReference: String
    paymentMethod: String
    createdBy: String
    createdAt: Date!
    updatedAt: Date!
}

type SettlementSummary {
    totalAmount: Float!
    totalPending: Float!
    totalPaid: Float!
    totalReceivable: Float!
    totalPayable: Float!
    count: Int!
    pendingCount: Int!
}

type Query {
    settlements(
        type: SettlementType
        direction: SettlementDirection
        status: SettlementStatus
        driverId: ID
        businessId: ID
        startDate: Date
        endDate: Date
        limit: Int
        offset: Int
    ): [Settlement!]!
    
    settlementSummary(
        type: SettlementType
        driverId: ID
        businessId: ID
        startDate: Date
        endDate: Date
    ): SettlementSummary!
    
    driverBalance(driverId: ID!): SettlementSummary!
    businessBalance(businessId: ID!): SettlementSummary!
}

type Mutation {
    markSettlementAsPaid(settlementId: ID!, paymentReference: String, paymentMethod: String): Settlement!
    markSettlementsAsPaid(ids: [ID!]!, paymentReference: String, paymentMethod: String): [Settlement!]!
    markSettlementAsPartiallyPaid(settlementId: ID!, amount: Float!): Settlement!
    unsettleSettlement(settlementId: ID!): Settlement!
    updateCommissionPercentage(driverId: ID, businessId: ID, percentage: Float!): Boolean! @deprecated(reason: "Use createSettlementRule instead")
    backfillSettlementsForDeliveredOrders: Int!
}

extend type Subscription {
    settlementCreated(type: SettlementType): Settlement!
    settlementStatusChanged(id: ID!): Settlement!
}
