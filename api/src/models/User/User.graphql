enum SignupStep {
    INITIAL
    EMAIL_SENT
    EMAIL_VERIFIED
    PHONE_SENT
    COMPLETED
}

enum UserRole {
    CUSTOMER
    DRIVER
    SUPER_ADMIN
    BUSINESS_ADMIN
}

type User {
    id: ID!
    email: String!
    firstName: String!
    lastName: String!
    address: String
    phoneNumber: String
    emailVerified: Boolean!
    phoneVerified: Boolean!
    signupStep: SignupStep!
    role: UserRole!
    businessId: ID
    business: Business
    adminNote: String
    flagColor: String
    imageUrl: String
    isOnline: Boolean!
    driverLocation: Location
    driverLocationUpdatedAt: Date
}

type SignupStepResponse {
    userId: ID!
    currentStep: SignupStep!
    message: String!
}

type AuthResponse {
    token: String!
    user: User!
    message: String!
}

input InitiateSignupInput {
    firstName: String!
    lastName: String!
    email: String!
    password: String!
}

input VerifyEmailInput {
    code: String!
}

input SubmitPhoneNumberInput {
    phoneNumber: String!
}

input VerifyPhoneInput {
    code: String!
}

input LoginInput {
    email: String!
    password: String!
}

input CreateUserInput {
    email: String!
    password: String!
    firstName: String!
    lastName: String!
    role: UserRole!
    businessId: ID
}

input UpdateUserInput {
    id: ID!
    firstName: String!
    lastName: String!
    role: UserRole!
    businessId: ID
}

type Query {
    me: User
    users: [User!]!
    drivers: [User!]!
}

type Mutation {
    initiateSignup(input: InitiateSignupInput!): AuthResponse! @skipAuth
    verifyEmail(input: VerifyEmailInput!): SignupStepResponse!
    resendEmailVerification: SignupStepResponse!
    submitPhoneNumber(input: SubmitPhoneNumberInput!): SignupStepResponse!
    verifyPhone(input: VerifyPhoneInput!): SignupStepResponse!
    login(input: LoginInput!): AuthResponse! @skipAuth
    createUser(input: CreateUserInput!): AuthResponse!
    updateUser(input: UpdateUserInput!): User!
    deleteUser(id: ID!): Boolean!
    updateUserNote(userId: ID!, note: String, flagColor: String): User!
    updateDriverLocation(latitude: Float!, longitude: Float!): User!
    adminUpdateDriverLocation(driverId: ID!, latitude: Float!, longitude: Float!): User!
    updateDriverOnlineStatus(isOnline: Boolean!): User!
}

type Subscription {
    driversUpdated: [User!]! @skipAuth
}
