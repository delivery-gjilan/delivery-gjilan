enum SignupStep {
    INITIAL
    EMAIL_SENT
    EMAIL_VERIFIED
    PHONE_SENT
    COMPLETED
}

type User {
    id: ID!
    email: String!
    firstName: String!
    lastName: String!
    address: String
    phoneNumber: String
    emailVerified: Boolean!
    phoneVerified: Boolean!
    signupStep: SignupStep!
}

type SignupStepResponse {
    userId: ID!
    currentStep: SignupStep!
    message: String!
}

type AuthResponse {
    token: String!
    user: User!
    message: String!
}

input InitiateSignupInput {
    firstName: String!
    lastName: String!
    email: String!
    password: String!
}

input VerifyEmailInput {
    userId: ID!
    code: String!
}

input SubmitPhoneNumberInput {
    userId: ID!
    phoneNumber: String!
}

input VerifyPhoneInput {
    userId: ID!
    code: String!
}

input LoginInput {
    email: String!
    password: String!
}

type Query {
    me: User
}

type Mutation {
    initiateSignup(input: InitiateSignupInput!): SignupStepResponse! @skipAuth
    verifyEmail(input: VerifyEmailInput!): SignupStepResponse! @skipAuth
    submitPhoneNumber(input: SubmitPhoneNumberInput!): SignupStepResponse! @skipAuth
    verifyPhone(input: VerifyPhoneInput!): SignupStepResponse! @skipAuth
    login(input: LoginInput!): AuthResponse! @skipAuth
}
