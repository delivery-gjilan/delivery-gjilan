enum SignupStep {
    INITIAL
    EMAIL_SENT
    EMAIL_VERIFIED
    PHONE_SENT
    COMPLETED
}

enum UserRole {
    CUSTOMER
    DRIVER
    SUPER_ADMIN
    BUSINESS_ADMIN
}

type User {
    id: ID!
    email: String!
    firstName: String!
    lastName: String!
    address: String
    phoneNumber: String
    emailVerified: Boolean!
    phoneVerified: Boolean!
    signupStep: SignupStep!
    role: UserRole!
    businessId: ID
    business: Business
}

type SignupStepResponse {
    userId: ID!
    currentStep: SignupStep!
    message: String!
}

type AuthResponse {
    token: String!
    user: User!
    message: String!
}

input InitiateSignupInput {
    firstName: String!
    lastName: String!
    email: String!
    password: String!
}

input VerifyEmailInput {
    code: String!
}

input SubmitPhoneNumberInput {
    phoneNumber: String!
}

input VerifyPhoneInput {
    code: String!
}

input LoginInput {
    email: String!
    password: String!
}

input CreateUserInput {
    email: String!
    password: String!
    firstName: String!
    lastName: String!
    role: UserRole!
    businessId: ID
}

type Query {
    me: User
    users: [User!]!
    drivers: [User!]!
}

type Mutation {
    initiateSignup(input: InitiateSignupInput!): AuthResponse! @skipAuth
    verifyEmail(input: VerifyEmailInput!): SignupStepResponse!
    resendEmailVerification: SignupStepResponse!
    submitPhoneNumber(input: SubmitPhoneNumberInput!): SignupStepResponse!
    verifyPhone(input: VerifyPhoneInput!): SignupStepResponse!
    login(input: LoginInput!): AuthResponse! @skipAuth
    createUser(input: CreateUserInput!): AuthResponse!
}
