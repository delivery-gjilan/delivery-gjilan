enum OrderStatus {
    PENDING
    PREPARING
    READY
    OUT_FOR_DELIVERY
    DELIVERED
    CANCELLED
    AWAITING_APPROVAL
}

enum OrderPaymentCollection {
    CASH_TO_DRIVER
    PREPAID_TO_PLATFORM
}

enum PromotionAppliesTo {
    PRICE
    DELIVERY
}

enum DriverCustomerNotificationKind {
    ETA_LT_3_MIN
    ARRIVED_WAITING
}

enum ApprovalReason {
    FIRST_ORDER
    HIGH_VALUE
    OUT_OF_ZONE
}

type OrderBusiness {
    business: Business!
    items: [OrderItem!]!
}

type OrderItemOption {
    id: ID!
    optionGroupId: ID!
    optionGroupName: String!
    optionId: ID!
    optionName: String!
    priceAtOrder: Float!
}

type OrderItem {
    id: ID!
    productId: ID!
    name: String!
    imageUrl: String
    quantity: Int!
    unitPrice: Float!
    notes: String
    selectedOptions: [OrderItemOption!]!
    childItems: [OrderItem!]!
    parentOrderItemId: ID
}

type OrderPromotion {
    id: ID!
    promotionId: ID!
    appliesTo: PromotionAppliesTo!
    discountAmount: Float!
    promoCode: String
}

type OrderReview {
    id: ID!
    orderId: ID!
    businessId: ID!
    userId: ID!
    rating: Int!
    comment: String
    quickFeedback: [String!]!
    createdAt: DateTime!
    updatedAt: DateTime!
}

type OrderDriverLiveTracking {
    orderId: ID!
    driverId: ID!
    latitude: Float!
    longitude: Float!
    navigationPhase: String
    remainingEtaSeconds: Int
    etaUpdatedAt: Date!
}

# Backward-compatibility shim for older mobile clients that still send
# a subscription input argument. The token field is ignored.
input SubscriptionInput {
    token: String
}

type DriverOrderFinancials {
    orderId: ID!
    paymentCollection: OrderPaymentCollection!
    # The total the driver collects from the customer (totalPrice for CASH_TO_DRIVER, 0 for PREPAID)
    amountToCollectFromCustomer: Float!
    # What the driver must remit to the platform (markup + surcharge + delivery commission share)
    amountToRemitToPlatform: Float!
    # Driver net earnings after remittance = amountToCollect - amountToRemit
    driverNetEarnings: Float!
}

type OrderSettlementLineItem {
    type: String!
    direction: String!
    amount: Float!
    reason: String!
    businessId: ID
    driverId: ID
    ruleId: ID
}

type OrderSettlementPreview {
    lineItems: [OrderSettlementLineItem!]!
    totalReceivable: Float!
    totalPayable: Float!
    netMargin: Float!
    driverAssigned: Boolean!
}

type Order {
    id: ID!
    displayId: String!
    userId: ID!
    businessId: ID!
    # Final prices
    deliveryPrice: Float!
    totalPrice: Float!
    prioritySurcharge: Float!
    # Legacy fields kept for backward compatibility (map to new columns)
    orderPrice: Float!
    originalPrice: Float
    orderDate: Date!
    updatedAt: Date!
    status: OrderStatus!
    paymentCollection: OrderPaymentCollection!
    preparationMinutes: Int
    estimatedReadyAt: Date
    preparingAt: Date
    readyAt: Date
    outForDeliveryAt: Date
    deliveredAt: Date
    cancelledAt: Date
    driverAssignedAt: Date
    driverArrivedAtPickup: Date
    cancellationReason: String
    user: User
    driver: User
    dropOffLocation: Location!
    pickupLocations: [Location!]!
    driverNotes: String
    adminNote: String
    needsApproval: Boolean!
    locationFlagged: Boolean!
    approvalReasons: [ApprovalReason!]
    businesses: [OrderBusiness!]!
    orderPromotions: [OrderPromotion!]
    review: OrderReview
    settlementPreview: OrderSettlementPreview
}

type OrderConnection {
    orders: [Order!]!
    totalCount: Int!
    hasMore: Boolean!
}

type Query {
    orders(limit: Int, offset: Int, statuses: [OrderStatus!], startDate: String, endDate: String): OrderConnection!
    order(id: ID!): Order
    ordersByStatus(status: OrderStatus!, limit: Int, offset: Int): [Order!]!
    cancelledOrders(limit: Int, offset: Int): [Order!]!
    uncompletedOrders: [Order!]!
    prioritySurchargeAmount: Float!
    driverOrderFinancials(orderId: ID!): DriverOrderFinancials
    businessOrderReviews(limit: Int, offset: Int): [OrderReview!]!
}

type Mutation {
    updateOrderStatus(id: ID!, status: OrderStatus!): Order!
    startPreparing(id: ID!, preparationMinutes: Int!): Order!
    updatePreparationTime(id: ID!, preparationMinutes: Int!): Order!
    assignDriverToOrder(id: ID!, driverId: ID): Order!
    driverNotifyCustomer(orderId: ID!, kind: DriverCustomerNotificationKind!): Boolean!
    cancelOrder(id: ID!): Order!
    adminCancelOrder(id: ID!, reason: String!, settleDriver: Boolean, settleBusiness: Boolean): Order!
    setOrderAdminNote(id: ID!, note: String): Order!
    approveOrder(id: ID!): Order!
    submitOrderReview(orderId: ID!, rating: Int!, comment: String, quickFeedback: [String!]): OrderReview!
    createOrder(input: CreateOrderInput!): Order!
    createTestOrder: Order!
}

type Subscription {
    orderStatusUpdated(orderId: ID!): Order! @skipAuth
    userOrdersUpdated(input: SubscriptionInput): [Order!]! @skipAuth
    orderDriverLiveTracking(orderId: ID!, input: SubscriptionInput): OrderDriverLiveTracking! @skipAuth
    allOrdersUpdated: [Order!]! @skipAuth
}

input CreateOrderItemOptionInput {
    optionGroupId: ID!
    optionId: ID!
    # Price the user pays for this option (extraPrice) at checkout time.
    # Required when extraPrice > 0, otherwise optional/0.
    price: Float
}

input CreateOrderChildItemInput {
    productId: ID!
    selectedOptions: [CreateOrderItemOptionInput!]!
}

input CreateOrderItemInput {
    productId: ID!
    quantity: Int!
    price: Float!
    notes: String
    selectedOptions: [CreateOrderItemOptionInput!]!
    childItems: [CreateOrderChildItemInput!]
}

input CreateOrderInput {
    items: [CreateOrderItemInput!]!
    dropOffLocation: LocationInput!
    userContextLocation: LocationInput
    # FINAL delivery fee the customer will pay (after promotion is applied).
    deliveryPrice: Float!
    # FINAL total (items + options + delivery + priority surcharge - discounts).
    totalPrice: Float!
    priorityRequested: Boolean
    prioritySurcharge: Float
    paymentCollection: OrderPaymentCollection
    promotionId: ID
    driverNotes: String
}

