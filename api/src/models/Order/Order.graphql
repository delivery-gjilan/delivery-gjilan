enum OrderStatus {
    PENDING
    PREPARING
    READY
    OUT_FOR_DELIVERY
    DELIVERED
    CANCELLED
    AWAITING_APPROVAL
}

enum OrderPaymentCollection {
    CASH_TO_DRIVER
    PREPAID_TO_PLATFORM
}

enum OrderChannel {
    PLATFORM
    DIRECT_DISPATCH
}

enum PromotionAppliesTo {
    PRICE
    DELIVERY
}

enum DriverCustomerNotificationKind {
    ETA_LT_3_MIN
    ARRIVED_WAITING
}

enum ApprovalReason {
    FIRST_ORDER
    HIGH_VALUE
    OUT_OF_ZONE
}

type OrderBusiness {
    business: Business!
    items: [OrderItem!]!
    removedItems: [RemovedOrderItem!]!
}

type RemovedOrderItem {
    id: ID!
    productId: ID!
    name: String!
    imageUrl: String
    """Original quantity before removal"""
    removedQuantity: Int!
    unitPrice: Float!
    reason: String!
    removedAt: Date
}

type OrderItemOption {
    id: ID!
    optionGroupId: ID!
    optionGroupName: String!
    optionId: ID!
    optionName: String!
    priceAtOrder: Float!
}

type OrderItem {
    id: ID!
    productId: ID!
    name: String!
    imageUrl: String
    quantity: Int!
    unitPrice: Float!
    notes: String
    selectedOptions: [OrderItemOption!]!
    childItems: [OrderItem!]!
    parentOrderItemId: ID
    """How many units of this item came from operator's personal inventory (0 = all from market)."""
    inventoryQuantity: Int!
}

type OrderPromotion {
    id: ID!
    promotionId: ID!
    appliesTo: PromotionAppliesTo!
    discountAmount: Float!
    promoCode: String
}

type OrderReview {
    id: ID!
    orderId: ID!
    businessId: ID!
    userId: ID!
    user: OrderReviewUser
    rating: Int!
    comment: String
    quickFeedback: [String!]!
    createdAt: DateTime!
    updatedAt: DateTime!
}

type OrderReviewUser {
    id: ID!
    firstName: String!
    lastName: String!
    phoneNumber: String
}

type OrderDriverLiveTracking {
    orderId: ID!
    driverId: ID!
    latitude: Float!
    longitude: Float!
    navigationPhase: String
    remainingEtaSeconds: Int
    etaUpdatedAt: Date!
}

# Backward-compatibility shim for older mobile clients that still send
# a subscription input argument. The token field is ignored.
input SubscriptionInput {
    token: String
}

type DriverOrderFinancials {
    orderId: ID!
    paymentCollection: OrderPaymentCollection!
    # The total the driver collects from the customer (totalPrice for CASH_TO_DRIVER, 0 for PREPAID)
    amountToCollectFromCustomer: Float!
    # What the driver must remit to the platform (markup + surcharge + delivery commission share)
    amountToRemitToPlatform: Float!
    # Driver net earnings after remittance = amountToCollect - amountToRemit
    driverNetEarnings: Float!
    # Tip included in this order (driver keeps it directly for CASH_TO_DRIVER)
    driverTip: Float!
}

type BusinessOrderFinancials {
    orderId: ID!
    paymentCollection: OrderPaymentCollection!
    # The base price of items from this business (before platform markup)
    businessPrice: Float!
    # Platform markup added on top of businessPrice
    markupAmount: Float!
    # What the customer paid for items (businessPrice + markup - promotions)
    customerPaid: Float!
    # Total amount owed TO the business (PAYABLE settlements)
    amountOwedToBusiness: Float!
    # Total amount owed BY the business (RECEIVABLE settlements)
    amountOwedByBusiness: Float!
    # Net settlement = owedTo - owedBy (positive = platform pays business)
    businessNetEarnings: Float!
}

type OrderSettlementLineItem {
    type: String!
    direction: String!
    amount: Float!
    reason: String!
    businessId: ID
    driverId: ID
    ruleId: ID
}

type OrderSettlementPreview {
    lineItems: [OrderSettlementLineItem!]!
    totalReceivable: Float!
    totalPayable: Float!
    netMargin: Float!
    driverAssigned: Boolean!
}

type Order {
    id: ID!
    displayId: String!
    userId: ID!
    businessId: ID!
    # Final prices
    deliveryPrice: Float!
    totalPrice: Float!
    prioritySurcharge: Float!
    driverTip: Float!
    # Legacy fields kept for backward compatibility (map to new columns)
    orderPrice: Float!
    originalPrice: Float
    orderDate: Date!
    updatedAt: Date!
    status: OrderStatus!
    paymentCollection: OrderPaymentCollection!
    channel: OrderChannel!
    recipientPhone: String
    recipientName: String
    preparationMinutes: Int
    estimatedReadyAt: Date
    preparingAt: Date
    readyAt: Date
    outForDeliveryAt: Date
    deliveredAt: Date
    cancelledAt: Date
    driverAssignedAt: Date
    driverArrivedAtPickup: Date
    cancellationReason: String
    user: User
    driver: User
    dropOffLocation: Location!
    pickupLocations: [Location!]!
    driverNotes: String
    adminNote: String
    needsApproval: Boolean!
    locationFlagged: Boolean!
    approvalReasons: [ApprovalReason!]
    businesses: [OrderBusiness!]!
    orderPromotions: [OrderPromotion!]
    review: OrderReview
    settlementPreview: OrderSettlementPreview
    """Total base price of items fulfilled from operator inventory. Null when inventory mode is off or no stock was used."""
    inventoryPrice: Float
}

type OrderConnection {
    orders: [Order!]!
    totalCount: Int!
    hasMore: Boolean!
}

type Query {
    orders(limit: Int, offset: Int, statuses: [OrderStatus!], startDate: String, endDate: String): OrderConnection!
    order(id: ID!): Order
    ordersByStatus(status: OrderStatus!, limit: Int, offset: Int): [Order!]!
    cancelledOrders(limit: Int, offset: Int): [Order!]!
    uncompletedOrders: [Order!]!
    prioritySurchargeAmount: Float!
    driverOrderFinancials(orderId: ID!): DriverOrderFinancials
    businessOrderFinancials(orderId: ID!, businessId: ID!): BusinessOrderFinancials
    businessOrderReviews(limit: Int, offset: Int): [OrderReview!]!
    adminOrderReviews(businessId: ID!, rating: Int, limit: Int, offset: Int): [OrderReview!]!
    directDispatchAvailability: DirectDispatchAvailability!
}

type Mutation {
    updateOrderStatus(id: ID!, status: OrderStatus!): Order!
    startPreparing(id: ID!, preparationMinutes: Int!): Order!
    updatePreparationTime(id: ID!, preparationMinutes: Int!): Order!
    assignDriverToOrder(id: ID!, driverId: ID): Order!
    driverNotifyCustomer(orderId: ID!, kind: DriverCustomerNotificationKind!): Boolean!
    cancelOrder(id: ID!): Order!
    adminCancelOrder(id: ID!, reason: String!, settleDriver: Boolean, settleBusiness: Boolean): Order!
    setOrderAdminNote(id: ID!, note: String): Order!
    approveOrder(id: ID!): Order!
    submitOrderReview(orderId: ID!, rating: Int!, comment: String, quickFeedback: [String!]): OrderReview!
    createOrder(input: CreateOrderInput!): Order!
    createTestOrder: Order!
    createDirectDispatchOrder(input: CreateDirectDispatchOrderInput!): Order!
    removeOrderItem(orderId: ID!, orderItemId: ID!, reason: String!, quantity: Int): Order!
}

type Subscription {
    orderStatusUpdated(orderId: ID!): Order! @skipAuth
    userOrdersUpdated(input: SubscriptionInput): [Order!]! @skipAuth
    orderDriverLiveTracking(orderId: ID!, input: SubscriptionInput): OrderDriverLiveTracking! @skipAuth
    allOrdersUpdated: [Order!]! @skipAuth
}

input CreateOrderItemOptionInput {
    optionGroupId: ID!
    optionId: ID!
    # Price the user pays for this option (extraPrice) at checkout time.
    # Required when extraPrice > 0, otherwise optional/0.
    price: Float
}

input CreateOrderChildItemInput {
    productId: ID!
    selectedOptions: [CreateOrderItemOptionInput!]!
}

input CreateOrderItemInput {
    productId: ID!
    quantity: Int!
    price: Float!
    notes: String
    selectedOptions: [CreateOrderItemOptionInput!]!
    childItems: [CreateOrderChildItemInput!]
}

input CreateOrderInput {
    items: [CreateOrderItemInput!]!
    dropOffLocation: LocationInput!
    userContextLocation: LocationInput
    # FINAL delivery fee the customer will pay (after promotion is applied).
    deliveryPrice: Float!
    # FINAL total (items + options + delivery + priority surcharge - discounts).
    totalPrice: Float!
    priorityRequested: Boolean
    prioritySurcharge: Float
    paymentCollection: OrderPaymentCollection
    promotionIds: [ID!]
    promotionId: ID
    driverNotes: String
    # Optional tip for the driver (added on top of the totalPrice)
    driverTip: Float
}

input CreateDirectDispatchOrderInput {
    """Delivery address for the recipient."""
    dropOffLocation: LocationInput!
    """Estimated preparation time in minutes for early dispatch scheduling."""
    preparationMinutes: Int!
    """Phone number of the recipient."""
    recipientPhone: String!
    """Optional name of the recipient."""
    recipientName: String
    """Optional notes for the driver."""
    driverNotes: String
}

type DirectDispatchAvailability {
    """Whether the business can create a direct dispatch order right now."""
    available: Boolean!
    """Human-readable reason if not available."""
    reason: String
    """Number of free drivers available for dispatch."""
    freeDriverCount: Int!
}

