enum OrderStatus {
    PENDING
    ACCEPTED
    READY
    OUT_FOR_DELIVERY
    DELIVERED
    CANCELLED
}

enum PromotionAppliesTo {
    PRICE
    DELIVERY
}

type OrderBusiness {
    business: Business!
    items: [OrderItem!]!
}

type OrderItem {
    productId: ID!
    name: String!
    imageUrl: String
    quantity: Int!
    price: Float!
    quantityInStock: Int!
    quantityNeeded: Int!
}

type OrderPromotion {
    id: ID!
    promotionId: ID!
    appliesTo: PromotionAppliesTo!
    discountAmount: Float!
}

type Order {
    id: ID!
    userId: ID!
    orderPrice: Float!
    deliveryPrice: Float!
    originalPrice: Float
    originalDeliveryPrice: Float
    totalPrice: Float!
    orderDate: Date!
    updatedAt: Date!
    status: OrderStatus!
    user: User
    driver: User
    dropOffLocation: Location!
    pickupLocations: [Location!]!
    businesses: [OrderBusiness!]!
    orderPromotions: [OrderPromotion!]
}

type Query {
    orders: [Order!]!
    order(id: ID!): Order
    ordersByStatus(status: OrderStatus!): [Order!]!
    uncompletedOrders: [Order!]!
}

type Mutation {
    updateOrderStatus(id: ID!, status: OrderStatus!): Order!
    assignDriverToOrder(id: ID!, driverId: ID): Order!
    cancelOrder(id: ID!): Order!
    createOrder(input: CreateOrderInput!): Order!
}

type Subscription {
    orderStatusUpdated(orderId: ID!): Order! @skipAuth
    userOrdersUpdated(input: SubscriptionInput!): [Order!]! @skipAuth
    allOrdersUpdated: [Order!]! @skipAuth
}

input CreateOrderInput {
    items: [CreateOrderItemInput!]!
    dropOffLocation: LocationInput!
    deliveryPrice: Float!
    totalPrice: Float! # For validation/check
    promoCode: String
}

input CreateOrderItemInput {
    productId: ID!
    quantity: Int!
    price: Float! # For validation/check
}
