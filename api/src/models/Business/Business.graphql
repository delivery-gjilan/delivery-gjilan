enum BusinessType {
    RESTAURANT
    MARKET
    PHARMACY
}

type Business {
    id: ID!
    name: String!
    imageUrl: String
    businessType: BusinessType!
    isActive: Boolean!
    location: Location!
    workingHours: WorkingHours!
    avgPrepTimeMinutes: Int!
    prepTimeOverrideMinutes: Int
    isOpen: Boolean!
    createdAt: Date!
    updatedAt: Date!
}

type Query {
    businesses: [Business!]! @skipAuth
    business(id: ID!): Business @skipAuth
}

input CreateBusinessInput {
    name: String!
    imageUrl: String
    businessType: BusinessType!
    location: LocationInput!
    workingHours: WorkingHoursInput!
    avgPrepTimeMinutes: Int
}

input UpdateBusinessInput {
    name: String
    imageUrl: String
    businessType: BusinessType
    location: LocationInput
    workingHours: WorkingHoursInput
    isActive: Boolean
    avgPrepTimeMinutes: Int
    prepTimeOverrideMinutes: Int
}

type Mutation {
    createBusiness(input: CreateBusinessInput!): Business!
    updateBusiness(id: ID!, input: UpdateBusinessInput!): Business!
    deleteBusiness(id: ID!): Boolean!
}
