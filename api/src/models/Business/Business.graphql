enum BusinessType {
    RESTAURANT
    MARKET
    PHARMACY
}

type Business {
    id: ID!
    name: String!
    description: String
    phoneNumber: String
    imageUrl: String
    businessType: BusinessType!
    isActive: Boolean!
    location: Location!
    workingHours: WorkingHours!
    schedule: [BusinessDayHours!]!
    avgPrepTimeMinutes: Int!
    prepTimeOverrideMinutes: Int
    isTemporarilyClosed: Boolean!
    temporaryClosureReason: String
    commissionPercentage: Float!
    minOrderAmount: Float!
    isFeatured: Boolean!
    featuredSortOrder: Int!
    category: String
    isOpen: Boolean!
    ratingAverage: Float!
    ratingCount: Int!
    activePromotion: BusinessPromotion
    activePromotionsDisplay: [BusinessPromotionDisplay!]!
    createdAt: Date!
    updatedAt: Date!
}

type BusinessPromotion {
    id: ID!
    name: String!
    description: String
    code: String
    type: PromotionType!
    creatorType: PromotionCreatorType!
    discountValue: Float
    spendThreshold: Float
}

enum PromotionApplyMethod {
    AUTO
    CODE_REQUIRED
}

type BusinessPromotionDisplay {
    id: ID!
    name: String!
    description: String
    code: String
    type: PromotionType!
    creatorType: PromotionCreatorType!
    discountValue: Float
    spendThreshold: Float
    priority: Int!
    requiresCode: Boolean!
    applyMethod: PromotionApplyMethod!
}

type Query {
    businesses: [Business!]! @skipAuth
    business(id: ID!): Business @skipAuth
    featuredBusinesses: [Business!]! @skipAuth
    businessPerformanceStats(days: Int): [BusinessPerformanceStat!]!
}

type BusinessPerformanceStat {
    businessId: ID!
    businessName: String!
    imageUrl: String
    isFeatured: Boolean!
    totalOrders: Int!
    totalRevenue: Float!
    avgOrderValue: Float!
}

input CreateBusinessInput {
    name: String!
    description: String
    phoneNumber: String
    imageUrl: String
    businessType: BusinessType!
    category: String
    location: LocationInput!
    workingHours: WorkingHoursInput!
    avgPrepTimeMinutes: Int
    minOrderAmount: Float
}

input CreateBusinessOwnerInput {
    email: String!
    password: String!
    firstName: String!
    lastName: String!
    isDemoAccount: Boolean
}

input CreateBusinessWithOwnerInput {
    business: CreateBusinessInput!
    owner: CreateBusinessOwnerInput!
}

type CreateBusinessWithOwnerPayload {
    business: Business!
    owner: User!
}

input UpdateBusinessInput {
    name: String
    description: String
    phoneNumber: String
    imageUrl: String
    businessType: BusinessType
    category: String
    location: LocationInput
    workingHours: WorkingHoursInput
    isActive: Boolean
    avgPrepTimeMinutes: Int
    prepTimeOverrideMinutes: Int
    isTemporarilyClosed: Boolean
    temporaryClosureReason: String
    commissionPercentage: Float
    minOrderAmount: Float
}

type Mutation {
    createBusiness(input: CreateBusinessInput!): Business!
    createBusinessWithOwner(input: CreateBusinessWithOwnerInput!): CreateBusinessWithOwnerPayload!
    updateBusiness(id: ID!, input: UpdateBusinessInput!): Business!
    deleteBusiness(id: ID!): Boolean!
    setBusinessSchedule(businessId: ID!, schedule: [BusinessDayHoursInput!]!): [BusinessDayHours!]!
    setBusinessFeatured(id: ID!, isFeatured: Boolean!, sortOrder: Int): Business!
}
