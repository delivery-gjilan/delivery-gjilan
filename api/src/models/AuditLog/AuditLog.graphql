enum ActorType {
    ADMIN
    BUSINESS
    DRIVER
    CUSTOMER
    SYSTEM
}

enum ActionType {
    # User management
    USER_CREATED
    USER_UPDATED
    USER_DELETED
    USER_ROLE_CHANGED
    
    # Business management
    BUSINESS_CREATED
    BUSINESS_UPDATED
    BUSINESS_DELETED
    BUSINESS_APPROVED
    BUSINESS_REJECTED
    
    # Product management
    PRODUCT_CREATED
    PRODUCT_UPDATED
    PRODUCT_DELETED
    PRODUCT_PUBLISHED
    PRODUCT_UNPUBLISHED
    PRODUCT_AVAILABILITY_CHANGED
    PRODUCT_PRICE_CHANGED
    
    # Order management
    ORDER_CREATED
    ORDER_UPDATED
    ORDER_STATUS_CHANGED
    ORDER_CANCELLED
    ORDER_ASSIGNED
    ORDER_DELIVERED
    ORDER_ITEM_REMOVED
    
    # Settlement management
    SETTLEMENT_CREATED
    SETTLEMENT_PAID
    SETTLEMENT_PARTIAL_PAID
    SETTLEMENT_UNSETTLED
    
    # Driver management
    DRIVER_CREATED
    DRIVER_UPDATED
    DRIVER_APPROVED
    DRIVER_REJECTED
    DRIVER_STATUS_CHANGED
    
    # Authentication
    USER_LOGIN
    USER_LOGOUT
    PASSWORD_CHANGED
    PASSWORD_RESET
    
    # Category management
    CATEGORY_CREATED
    CATEGORY_UPDATED
    CATEGORY_DELETED
    SUBCATEGORY_CREATED
    SUBCATEGORY_UPDATED
    SUBCATEGORY_DELETED
}

enum EntityType {
    USER
    BUSINESS
    PRODUCT
    ORDER
    SETTLEMENT
    DRIVER
    CATEGORY
    SUBCATEGORY
    DELIVERY_ZONE
}

type AuditLog {
    id: ID!
    actorId: ID
    actor: User
    actorType: ActorType!
    action: ActionType!
    entityType: EntityType!
    entityId: ID
    metadata: JSON
    ipAddress: String
    userAgent: String
    createdAt: DateTime!
}

type AuditLogConnection {
    logs: [AuditLog!]!
    total: Int!
    hasMore: Boolean!
}

type Query {
    auditLogs(
        actorId: ID
        actorType: ActorType
        action: ActionType
        entityType: EntityType
        entityId: ID
        startDate: DateTime
        endDate: DateTime
        limit: Int
        offset: Int
    ): AuditLogConnection!
    
    auditLog(id: ID!): AuditLog
}

extend type Subscription {
    auditLogCreated(
        actorType: ActorType
        action: ActionType
        entityType: EntityType
    ): AuditLog!
}
