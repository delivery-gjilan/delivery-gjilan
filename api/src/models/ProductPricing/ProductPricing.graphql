type ProductPricing {
  id: ID!
  productId: String!
  businessId: String!
  businessPrice: String!
  platformMarkup: String!
  baseCustomerPrice: String!
  priceHistory: [PriceHistoryEntry!]!
  createdAt: String!
  updatedAt: String!
}

type PriceHistoryEntry {
  changedAt: String!
  businessPrice: String!
  platformMarkup: String!
  baseCustomerPrice: String!
  changedBy: String
  reason: String
}

type DynamicPricingRuleAppliesTo {
  categoryIds: [String!]
  subcategoryIds: [String!]
  productIds: [String!]
  allProducts: Boolean
}

type DynamicPricingRule {
  id: ID!
  businessId: String
  name: String!
  description: String
  conditionType: PricingConditionType!
  conditionConfig: JSON!
  adjustmentConfig: JSON!
  appliesTo: DynamicPricingRuleAppliesTo!
  priority: Int!
  isActive: Boolean!
  validFrom: String
  validUntil: String
  createdAt: String!
  createdBy: String
  updatedAt: String!
}

enum PricingConditionType {
  TIME_OF_DAY
  DAY_OF_WEEK
  WEATHER
  DEMAND
  SPECIAL_EVENT
  CUSTOM
}

enum PriceAdjustmentType {
  PERCENTAGE
  FIXED_AMOUNT
  MULTIPLIER
}

input DynamicPricingRuleAppliesToInput {
  categoryIds: [String!]
  subcategoryIds: [String!]
  productIds: [String!]
  allProducts: Boolean
}

input UpdateProductPricingInput {
  businessPrice: String
  platformMarkup: String
  reason: String
}

input CreateDynamicPricingRuleInput {
  businessId: String
  name: String!
  description: String
  conditionType: PricingConditionType!
  conditionConfig: JSON!
  adjustmentConfig: JSON!
  appliesTo: DynamicPricingRuleAppliesToInput!
  priority: Int
  validFrom: String
  validUntil: String
}

input UpdateDynamicPricingRuleInput {
  name: String
  description: String
  conditionConfig: JSON
  adjustmentConfig: JSON
  appliesTo: DynamicPricingRuleAppliesToInput
  priority: Int
  validFrom: String
  validUntil: String
  isActive: Boolean
}

extend type Query {
  productPricing(productId: ID!): ProductPricing
  productPricingByBusiness(businessId: ID!): [ProductPricing!]!
  dynamicPricingRules(businessId: ID): [DynamicPricingRule!]!
  calculateProductPrice(productId: ID!): String!
}

extend type Mutation {
  updateProductPricing(productId: ID!, businessId: ID!, input: UpdateProductPricingInput!): ProductPricing!
  createDynamicPricingRule(input: CreateDynamicPricingRuleInput!): DynamicPricingRule!
  updateDynamicPricingRule(id: ID!, input: UpdateDynamicPricingRuleInput!): DynamicPricingRule!
  deleteDynamicPricingRule(id: ID!): Boolean!
}
