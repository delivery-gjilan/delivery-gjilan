# Grafana alert provisioning — contact points and notification policies
apiVersion: 1

contactPoints:
  - orgId: 1
    name: delivery-alerts
    receivers:
      # Email alerts — set GF_SMTP_* env vars in docker-compose to activate
      - uid: email-alerts
        type: email
        settings:
          addresses: ops@example.com
          singleEmail: true

policies:
  - orgId: 1
    receiver: delivery-alerts
    group_by: ["alertname", "service"]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
