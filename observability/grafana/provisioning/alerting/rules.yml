# Grafana alert rules — provisioned on startup
apiVersion: 1

groups:
  - orgId: 1
    name: delivery-api-alerts
    folder: Delivery Alerts
    interval: 1m
    rules:
      # ────────────────────────────────────────────
      # 1. High 5xx Error Rate (>5% over 5 min)
      # ────────────────────────────────────────────
      - uid: high-error-rate
        title: "High API Error Rate (>5%)"
        condition: error_rate
        data:
          - refId: errors
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: loki
            model:
              expr: >
                sum(count_over_time({job="delivery-api"} | json | msg=`request:finish` | statusCode >= 500 [5m]))
              refId: errors
          - refId: total
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: loki
            model:
              expr: >
                sum(count_over_time({job="delivery-api"} | json | msg=`request:finish` [5m]))
              refId: total
          - refId: error_rate
            datasourceUid: "__expr__"
            model:
              type: math
              expression: "$errors / $total * 100"
              conditions:
                - evaluator: { type: gt, params: [5] }
                  operator: { type: and }
                  reducer: { type: last }
        for: 5m
        labels:
          severity: critical
          service: api
        annotations:
          summary: "API error rate exceeds 5%"
          description: "More than 5% of API requests returned 5xx status codes over the last 5 minutes."

      # ────────────────────────────────────────────
      # 2. Slow API (p95 > 2s over 5 min)
      # ────────────────────────────────────────────
      - uid: slow-api-p95
        title: "Slow API Response (p95 > 2s)"
        condition: latency_check
        data:
          - refId: p95
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: loki
            model:
              expr: >
                quantile_over_time(0.95, {job="delivery-api"} | json | msg=`request:finish` | unwrap durationMs [5m]) by ()
              refId: p95
          - refId: latency_check
            datasourceUid: "__expr__"
            model:
              type: threshold
              expression: "$p95"
              conditions:
                - evaluator: { type: gt, params: [2000] }
                  operator: { type: and }
                  reducer: { type: last }
        for: 5m
        labels:
          severity: warning
          service: api
        annotations:
          summary: "API p95 latency exceeds 2 seconds"
          description: "The 95th percentile response time has been above 2000ms for 5 minutes."

      # ────────────────────────────────────────────
      # 3. Payment / Settlement Failures
      # ────────────────────────────────────────────
      - uid: payment-failures
        title: "Payment Failures Spike"
        condition: payment_fail_check
        data:
          - refId: payment_errors
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: loki
            model:
              expr: >
                sum(count_over_time({job="delivery-api"} | json | service=`FinancialService` | level=`error` [5m]))
              refId: payment_errors
          - refId: payment_fail_check
            datasourceUid: "__expr__"
            model:
              type: threshold
              expression: "$payment_errors"
              conditions:
                - evaluator: { type: gt, params: [3] }
                  operator: { type: and }
                  reducer: { type: last }
        for: 2m
        labels:
          severity: critical
          service: payments
        annotations:
          summary: "Multiple payment failures detected"
          description: "More than 3 payment/settlement errors occurred in the last 5 minutes."

      # ────────────────────────────────────────────
      # 4. Driver Watchdog — Mass Disconnects
      # ────────────────────────────────────────────
      - uid: driver-mass-disconnect
        title: "Mass Driver Disconnects"
        condition: disconnect_check
        data:
          - refId: disconnects
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: loki
            model:
              expr: >
                sum(count_over_time({job="delivery-api"} | json | service=`DriverWatchdog` | msg=~`.*force.*offline.*|.*timed out.*` [5m]))
              refId: disconnects
          - refId: disconnect_check
            datasourceUid: "__expr__"
            model:
              type: threshold
              expression: "$disconnects"
              conditions:
                - evaluator: { type: gt, params: [5] }
                  operator: { type: and }
                  reducer: { type: last }
        for: 3m
        labels:
          severity: warning
          service: drivers
        annotations:
          summary: "Multiple drivers forced offline"
          description: "More than 5 drivers were forced offline by the watchdog in 5 minutes — possible infrastructure issue."

      # ────────────────────────────────────────────
      # 5. Zero Request Volume (API Down?)
      # ────────────────────────────────────────────
      - uid: zero-traffic
        title: "No API Traffic Detected"
        condition: traffic_check
        data:
          - refId: requests
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: loki
            model:
              expr: >
                sum(count_over_time({job="delivery-api"} | json | msg=`request:finish` [5m]))
              refId: requests
          - refId: traffic_check
            datasourceUid: "__expr__"
            model:
              type: threshold
              expression: "$requests"
              conditions:
                - evaluator: { type: lt, params: [1] }
                  operator: { type: and }
                  reducer: { type: last }
        for: 10m
        labels:
          severity: critical
          service: api
        annotations:
          summary: "No API traffic for 10 minutes"
          description: "The API has received zero requests in the last 10 minutes — it may be down."

      # ────────────────────────────────────────────
      # 6. Fatal Errors (immediate)
      # ────────────────────────────────────────────
      - uid: fatal-errors
        title: "Fatal Error Logged"
        condition: fatal_check
        data:
          - refId: fatals
            relativeTimeRange: { from: 60, to: 0 }
            datasourceUid: loki
            model:
              expr: >
                sum(count_over_time({job="delivery-api", level="fatal"} [1m]))
              refId: fatals
          - refId: fatal_check
            datasourceUid: "__expr__"
            model:
              type: threshold
              expression: "$fatals"
              conditions:
                - evaluator: { type: gt, params: [0] }
                  operator: { type: and }
                  reducer: { type: last }
        for: 0m
        labels:
          severity: critical
          service: api
        annotations:
          summary: "Fatal error in API"
          description: "A fatal-level error was logged — the process may have crashed."

      # ────────────────────────────────────────────
      # 7. Subscription Reject Spike
      # ────────────────────────────────────────────
      - uid: subscription-reject-spike
        title: "Subscription Reject Spike"
        condition: reject_check
        data:
          - refId: rejected
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              editorMode: code
              expr: sum(increase(graphql_subscribe_rejected_total[5m]))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: rejected
          - refId: reject_check
            datasourceUid: "__expr__"
            model:
              type: threshold
              expression: "$rejected"
              conditions:
                - evaluator: { type: gt, params: [10] }
                  operator: { type: and }
                  reducer: { type: last }
        for: 2m
        labels:
          severity: warning
          service: realtime
        annotations:
          summary: "Subscription rejects are spiking"
          description: "More than 10 subscription requests were rejected in the last 5 minutes. This usually points to validation or rate-limit pressure."

      # ────────────────────────────────────────────
      # 8. Subscription Runtime Errors
      # ────────────────────────────────────────────
      - uid: subscription-runtime-errors
        title: "Subscription Runtime Errors"
        condition: subscription_error_check
        data:
          - refId: subscription_errors
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              editorMode: code
              expr: sum(increase(graphql_subscription_errors_total[5m]))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: subscription_errors
          - refId: subscription_error_check
            datasourceUid: "__expr__"
            model:
              type: threshold
              expression: "$subscription_errors"
              conditions:
                - evaluator: { type: gt, params: [5] }
                  operator: { type: and }
                  reducer: { type: last }
        for: 1m
        labels:
          severity: critical
          service: realtime
        annotations:
          summary: "Subscription runtime errors detected"
          description: "More than 5 subscription lifecycle errors were recorded in the last 5 minutes."

      # ────────────────────────────────────────────
      # 9. Pubsub Publish Failure
      # ────────────────────────────────────────────
      - uid: pubsub-publish-failure
        title: "Pubsub Publish Failure"
        condition: pubsub_failure_check
        data:
          - refId: pubsub_failures
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              editorMode: code
              expr: sum(increase(pubsub_publish_failures_total[5m]))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: pubsub_failures
          - refId: pubsub_failure_check
            datasourceUid: "__expr__"
            model:
              type: threshold
              expression: "$pubsub_failures"
              conditions:
                - evaluator: { type: gt, params: [0] }
                  operator: { type: and }
                  reducer: { type: last }
        for: 0m
        labels:
          severity: critical
          service: realtime
        annotations:
          summary: "Pubsub publish failure detected"
          description: "At least one pubsub publish failure occurred in the last 5 minutes. Check Redis bridge health and the realtime event feed immediately."

      # ────────────────────────────────────────────
      # 10. All Connected Drivers Lost
      # ────────────────────────────────────────────
      - uid: all-drivers-lost
        title: "All Connected Drivers Lost"
        condition: drivers_lost_check
        data:
          - refId: connected
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              editorMode: code
              expr: drivers_by_connection_status{status="CONNECTED"}
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: connected
          - refId: drivers_lost_check
            datasourceUid: "__expr__"
            model:
              type: threshold
              expression: "$connected"
              conditions:
                - evaluator: { type: lt, params: [1] }
                  operator: { type: and }
                  reducer: { type: last }
        for: 5m
        labels:
          severity: critical
          service: fleet
        annotations:
          summary: "Zero connected drivers"
          description: "No drivers have been in CONNECTED state for 5 minutes. Check driver app and WebSocket server health."

      # ────────────────────────────────────────────
      # 11. Business Device Offline Spike (>20%)
      # ────────────────────────────────────────────
      - uid: business-offline-spike
        title: "Business Device Offline Spike (>20%)"
        condition: offline_spike_check
        data:
          - refId: offline
            relativeTimeRange: { from: 180, to: 0 }
            datasourceUid: prometheus
            model:
              editorMode: code
              expr: business_devices_by_online_status{status="OFFLINE"}
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: offline
          - refId: total
            relativeTimeRange: { from: 180, to: 0 }
            datasourceUid: prometheus
            model:
              editorMode: code
              expr: sum(business_devices_by_online_status)
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: total
          - refId: offline_ratio
            datasourceUid: "__expr__"
            model:
              type: math
              expression: "$offline / $total * 100"
              refId: offline_ratio
          - refId: offline_spike_check
            datasourceUid: "__expr__"
            model:
              type: threshold
              expression: "$offline_ratio"
              conditions:
                - evaluator: { type: gt, params: [20] }
                  operator: { type: and }
                  reducer: { type: last }
        for: 3m
        labels:
          severity: warning
          service: fleet
        annotations:
          summary: "More than 20% of business devices are offline"
          description: "Over 20% of registered business devices have not sent a heartbeat in more than 5 minutes. Possible connectivity issue."

      # ────────────────────────────────────────────
      # 12. Stuck Order Pipeline (>3 stuck orders)
      # ────────────────────────────────────────────
      - uid: order-stuck-pipeline
        title: "Stuck Order Pipeline (>3)"
        condition: stuck_check
        data:
          - refId: stuck
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              editorMode: code
              expr: sum(orders_stuck_total)
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: stuck
          - refId: stuck_check
            datasourceUid: "__expr__"
            model:
              type: threshold
              expression: "$stuck"
              conditions:
                - evaluator: { type: gt, params: [3] }
                  operator: { type: and }
                  reducer: { type: last }
        for: 5m
        labels:
          severity: critical
          service: orders
        annotations:
          summary: "Order pipeline is stuck (>3 stuck orders)"
          description: "More than 3 orders have been stuck in PENDING/READY/OUT_FOR_DELIVERY beyond their SLO thresholds for 5 minutes. Check business devices and driver availability."

      # ────────────────────────────────────────────
      # 13. Push Failure Rate Spike (>20%)
      # ────────────────────────────────────────────
      - uid: push-failure-rate-spike
        title: "Push Failure Rate Spike (>20%)"
        condition: push_failure_rate_check
        data:
          - refId: push_failed
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              editorMode: code
              expr: sum(increase(push_notifications_provider_failed_total[5m]))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: push_failed
          - refId: push_sent
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              editorMode: code
              expr: sum(increase(push_notifications_sent_total[5m]))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: push_sent
          - refId: push_failure_rate
            datasourceUid: "__expr__"
            model:
              type: math
              expression: "$push_failed / max($push_sent, 1) * 100"
              refId: push_failure_rate
          - refId: push_failure_rate_check
            datasourceUid: "__expr__"
            model:
              type: threshold
              expression: "$push_failure_rate"
              conditions:
                - evaluator: { type: gt, params: [20] }
                  operator: { type: and }
                  reducer: { type: last }
        for: 5m
        labels:
          severity: warning
          service: notifications
        annotations:
          summary: "Push failure rate is above 20%"
          description: "Provider push failures exceeded 20% for 5 minutes. Check FCM/APNs health, invalid token churn, and payload integrity."

      # ────────────────────────────────────────────
      # 14. Push Delivery Lost (0 accepted while sending)
      # ────────────────────────────────────────────
      - uid: push-delivery-lost
        title: "Push Delivery Lost (0 accepted while sending)"
        condition: push_delivery_lost_check
        data:
          - refId: push_sent
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              editorMode: code
              expr: sum(increase(push_notifications_sent_total[5m]))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: push_sent
          - refId: push_accepted
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              editorMode: code
              expr: sum(increase(push_notifications_provider_accepted_total[5m]))
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              range: false
              refId: push_accepted
          - refId: push_sending_present
            datasourceUid: "__expr__"
            model:
              type: threshold
              expression: "$push_sent"
              conditions:
                - evaluator: { type: gt, params: [10] }
                  operator: { type: and }
                  reducer: { type: last }
          - refId: push_delivery_lost_check
            datasourceUid: "__expr__"
            model:
              type: threshold
              expression: "$push_accepted"
              conditions:
                - evaluator: { type: lt, params: [1] }
                  operator: { type: and }
                  reducer: { type: last }
        for: 3m
        labels:
          severity: critical
          service: notifications
        annotations:
          summary: "Push sends have no accepted deliveries"
          description: "Push sends are happening but none are being accepted by the provider in the last 5 minutes. Check provider auth keys and outbound networking."

  # ── Server infrastructure alerts (node_exporter / Prometheus) ──
  - orgId: 1
    name: server-infra-alerts
    folder: Delivery Alerts
    interval: 1m
    rules:
      # ────────────────────────────────────────────
      # Disk >80% full
      # ────────────────────────────────────────────
      - uid: disk-almost-full
        title: "Disk Almost Full (>80%)"
        condition: disk_check
        data:
          - refId: disk_used
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              editorMode: code
              expr: >
                (1 - node_filesystem_avail_bytes{fstype!~"tmpfs|fuse.lxcfs",mountpoint="/"} / node_filesystem_size_bytes{fstype!~"tmpfs|fuse.lxcfs",mountpoint="/"}) * 100
              instant: true
              refId: disk_used
          - refId: disk_check
            datasourceUid: "__expr__"
            model:
              type: threshold
              expression: "$disk_used"
              conditions:
                - evaluator: { type: gt, params: [80] }
                  operator: { type: and }
                  reducer: { type: last }
        for: 5m
        labels:
          severity: warning
          service: server
        annotations:
          summary: "Server disk usage above 80%"
          description: "Root filesystem is more than 80% full. Clean up logs or expand storage before it hits 100% and Postgres stops writing."

      # ────────────────────────────────────────────
      # Disk >95% full — critical
      # ────────────────────────────────────────────
      - uid: disk-critical
        title: "Disk Critical (>95%)"
        condition: disk_crit_check
        data:
          - refId: disk_used
            relativeTimeRange: { from: 60, to: 0 }
            datasourceUid: prometheus
            model:
              editorMode: code
              expr: >
                (1 - node_filesystem_avail_bytes{fstype!~"tmpfs|fuse.lxcfs",mountpoint="/"} / node_filesystem_size_bytes{fstype!~"tmpfs|fuse.lxcfs",mountpoint="/"}) * 100
              instant: true
              refId: disk_used
          - refId: disk_crit_check
            datasourceUid: "__expr__"
            model:
              type: threshold
              expression: "$disk_used"
              conditions:
                - evaluator: { type: gt, params: [95] }
                  operator: { type: and }
                  reducer: { type: last }
        for: 0m
        labels:
          severity: critical
          service: server
        annotations:
          summary: "Disk critically full (>95%)"
          description: "Disk is above 95%. Postgres WILL stop writing soon. Immediate action required."

      # ────────────────────────────────────────────
      # RAM >90% used
      # ────────────────────────────────────────────
      - uid: high-memory
        title: "High Memory Usage (>90%)"
        condition: mem_check
        data:
          - refId: mem_used
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              editorMode: code
              expr: >
                (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100
              instant: true
              refId: mem_used
          - refId: mem_check
            datasourceUid: "__expr__"
            model:
              type: threshold
              expression: "$mem_used"
              conditions:
                - evaluator: { type: gt, params: [90] }
                  operator: { type: and }
                  reducer: { type: last }
        for: 5m
        labels:
          severity: warning
          service: server
        annotations:
          summary: "Server memory above 90%"
          description: "Available RAM is below 10%. OOM killer may start terminating processes. Consider restarting non-essential services or scaling up."

      # ────────────────────────────────────────────
      # CPU >90% sustained for 5 min
      # ────────────────────────────────────────────
      - uid: high-cpu
        title: "High CPU Usage (>90% for 5m)"
        condition: cpu_check
        data:
          - refId: cpu_used
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              editorMode: code
              expr: >
                100 - (avg(rate(node_cpu_seconds_total{mode="idle"}[2m])) * 100)
              instant: true
              refId: cpu_used
          - refId: cpu_check
            datasourceUid: "__expr__"
            model:
              type: threshold
              expression: "$cpu_used"
              conditions:
                - evaluator: { type: gt, params: [90] }
                  operator: { type: and }
                  reducer: { type: last }
        for: 5m
        labels:
          severity: warning
          service: server
        annotations:
          summary: "CPU sustained above 90% for 5 minutes"
          description: "Server CPU has been above 90% for 5 minutes. API latency will degrade. Check for runaway processes."

      # ────────────────────────────────────────────
      # API /ready endpoint returning non-200
      # ────────────────────────────────────────────
      - uid: api-not-ready
        title: "API /ready Failing (DB or Redis down)"
        condition: ready_check
        data:
          - refId: ready
            relativeTimeRange: { from: 120, to: 0 }
            datasourceUid: prometheus
            model:
              editorMode: code
              expr: >
                probe_success{job="delivery-api-ready"}
              instant: true
              refId: ready
          - refId: ready_check
            datasourceUid: "__expr__"
            model:
              type: threshold
              expression: "$ready"
              conditions:
                - evaluator: { type: lt, params: [1] }
                  operator: { type: and }
                  reducer: { type: last }
        for: 2m
        labels:
          severity: critical
          service: server
        annotations:
          summary: "API /ready is failing"
          description: "/ready returned non-200 for 2 minutes — Postgres or Redis is likely down."
