# ───────────────────────────────────────────────────────────────
# Observability stack — Grafana, Loki, Promtail, Prometheus,
#                       node_exporter, blackbox_exporter, GlitchTip
#
# Run:  docker compose -f observability/docker-compose.yml up -d
#
# Access:
#   Grafana   → http://localhost:3100  (admin / admin)
#   Loki API  → http://localhost:3200  (internal — Grafana reads from here)
#   Prometheus → http://localhost:9090
# ───────────────────────────────────────────────────────────────

services:
  # ── Loki: log aggregation ──────────────────────────────────
  loki:
    image: grafana/loki:3.4.2
    container_name: delivery-loki
    restart: unless-stopped
    ports:
      - "3200:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Promtail: ships logs to Loki ───────────────────────────
  promtail:
    image: grafana/promtail:3.4.2
    container_name: delivery-promtail
    restart: unless-stopped
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml
      - ../api/logs:/var/log/api:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy

  # ── Prometheus: metrics scraping and alert inputs ─────────
  prometheus:
    image: prom/prometheus:v3.4.1
    container_name: delivery-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── node_exporter: host CPU / RAM / disk metrics ────────────
  node-exporter:
    image: prom/node-exporter:v1.9.1
    container_name: delivery-node-exporter
    restart: unless-stopped
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    ports:
      - "9100:9100"

  # ── blackbox_exporter: probes /ready to detect DB/Redis down ─
  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: delivery-blackbox
    restart: unless-stopped
    ports:
      - "9115:9115"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Grafana: dashboards + alerts ───────────────────────────
  grafana:
    image: grafana/grafana:11.6.0
    container_name: delivery-grafana
    restart: unless-stopped
    ports:
      - "3100:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_ALERTING_ENABLED: "true"
      GF_UNIFIED_ALERTING_ENABLED: "true"
      # ── Email alerts — fill these in to receive alert emails ──
      # GF_SMTP_ENABLED: "true"
      # GF_SMTP_HOST: smtp.gmail.com:587
      # GF_SMTP_USER: your@gmail.com
      # GF_SMTP_PASSWORD: your-app-password
      # GF_SMTP_FROM_ADDRESS: your@gmail.com
      # GF_SMTP_FROM_NAME: "Delivery Alerts"
      # ALERT_EMAIL: your@gmail.com
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      loki:
        condition: service_healthy
      prometheus:
        condition: service_started

  # ── GlitchTip: self-hosted Sentry-compatible error tracking ──
  glitchtip-db:
    image: postgres:16-alpine
    container_name: delivery-glitchtip-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: glitchtip
      POSTGRES_USER: glitchtip
      POSTGRES_PASSWORD: glitchtip
    volumes:
      - glitchtip-db-data:/var/lib/postgresql/data

  glitchtip-redis:
    image: redis:7-alpine
    container_name: delivery-glitchtip-redis
    restart: unless-stopped

  glitchtip:
    image: glitchtip/glitchtip:latest
    container_name: delivery-glitchtip
    restart: unless-stopped
    depends_on:
      - glitchtip-db
      - glitchtip-redis
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://glitchtip:glitchtip@glitchtip-db:5432/glitchtip
      REDIS_URL: redis://glitchtip-redis:6379
      SECRET_KEY: change-this-to-a-random-secret-in-production
      PORT: 8000
      EMAIL_URL: consolemail://  # prints emails to docker logs — replace with real SMTP in prod
      GLITCHTIP_DOMAIN: http://localhost:8000
      DEFAULT_AUTO_FIELD: django.db.models.BigAutoField
      CELERY_WORKER_AUTOSCALE: "1,3"
      CELERY_WORKER_MAX_TASKS_PER_CHILD: "10000"

  glitchtip-worker:
    image: glitchtip/glitchtip:latest
    container_name: delivery-glitchtip-worker
    restart: unless-stopped
    depends_on:
      - glitchtip-db
      - glitchtip-redis
    command: ./bin/run-celery-with-beat.sh
    environment:
      DATABASE_URL: postgresql://glitchtip:glitchtip@glitchtip-db:5432/glitchtip
      REDIS_URL: redis://glitchtip-redis:6379
      SECRET_KEY: change-this-to-a-random-secret-in-production

volumes:
  loki-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  glitchtip-db-data:
    driver: local
