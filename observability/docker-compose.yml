# ───────────────────────────────────────────────────────────────
# Observability stack — Grafana, Loki, Promtail, Prometheus
#
# Run:  docker compose -f observability/docker-compose.yml up -d
#
# Access:
#   Grafana   → http://localhost:3100  (admin / admin)
#   Loki API  → http://localhost:3200  (internal — Grafana reads from here)
#   Prometheus → http://localhost:9090
# ───────────────────────────────────────────────────────────────

services:
  # ── Loki: log aggregation ──────────────────────────────────
  loki:
    image: grafana/loki:3.4.2
    container_name: delivery-loki
    restart: unless-stopped
    ports:
      - "3200:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Promtail: ships logs to Loki ───────────────────────────
  promtail:
    image: grafana/promtail:3.4.2
    container_name: delivery-promtail
    restart: unless-stopped
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml
      - ../api/logs:/var/log/api:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy

  # ── Prometheus: metrics scraping and alert inputs ─────────
  prometheus:
    image: prom/prometheus:v3.4.1
    container_name: delivery-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Grafana: dashboards + alerts ───────────────────────────
  grafana:
    image: grafana/grafana:11.6.0
    container_name: delivery-grafana
    restart: unless-stopped
    ports:
      - "3100:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_ALERTING_ENABLED: "true"
      GF_UNIFIED_ALERTING_ENABLED: "true"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      loki:
        condition: service_healthy
      prometheus:
        condition: service_started

volumes:
  loki-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
