global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: delivery-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - 178.104.94.20:4000

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: node-exporter
    static_configs:
      - targets:
          - 178.104.94.20:9100

  - job_name: delivery-api-ready
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://178.104.94.20:4000/ready
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115